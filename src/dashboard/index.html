<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Automation — Perplexity Style</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' ws: wss: http://localhost:* https://localhost:* https://unpkg.com; img-src 'self' data: https://*.fbcdn.net https://*.facebook.com https://tpc.googlesyndication.com https://img.youtube.com https://lh3.googleusercontent.com https://*.googleusercontent.com;" />
  <!--
    PRODUCTION NOTE: For deployment, generate SRI hashes for each script:
      openssl dgst -sha384 -binary <file> | openssl base64 -A
    Then add integrity="sha384-<hash>" crossorigin="anonymous" to each <script>.
    Tailwind CDN is dynamic and incompatible with SRI — use the CLI build instead.
  -->
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            ppl: {
              teal: '#20B2AA',
              bg: '#FAFAFA',
              card: '#FFFFFF',
              border: '#E8E8E8',
              text: '#1A1A1A',
              sub: '#6B7280',
              hover: '#F3F4F6',
              accent: '#14B8A6',
            }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .typing-cursor::after { content: ''; display: inline-block; width: 2px; height: 1em; background: #20B2AA; margin-left: 2px; animation: blink 1s infinite; vertical-align: text-bottom; }
    @keyframes blink { 0%,50% { opacity: 1 } 51%,100% { opacity: 0 } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeInUp 0.4s ease-out forwards; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
    input:focus, select:focus { outline: none; box-shadow: 0 0 0 2px rgba(20,184,166,0.3); }
  </style>
</head>
<body class="bg-ppl-bg text-ppl-text">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo, Component } = React;
    const { AreaChart, Area, LineChart, Line, BarChart, Bar, ComposedChart, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

    // ─── Error Boundary (prevents full dashboard crash) ──────
    class ErrorBoundary extends Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, info) { console.error('Dashboard error:', error, info); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex items-center justify-center h-screen bg-ppl-bg">
              <div className="bg-white rounded-2xl border border-red-200 p-8 max-w-md text-center shadow-sm">
                <p className="text-lg font-semibold text-red-600 mb-2">Dashboard Error</p>
                <p className="text-sm text-ppl-sub mb-4">{this.state.error?.message || 'An unexpected error occurred'}</p>
                <button onClick={() => { this.setState({ hasError: false, error: null }); window.location.reload(); }}
                  className="px-4 py-2 bg-ppl-teal text-white rounded-lg text-sm hover:bg-teal-600 transition-colors">
                  Reload Dashboard
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // Locale-safe Korean number formatter (consistent across all browsers)
    const krwFmt = new Intl.NumberFormat('ko-KR');

    // Dynamic URL generation — works in dev (localhost) and production
    const _host = window.location.hostname || 'localhost';
    const _apiPort = '3099';
    const API = `${window.location.protocol}//${_host}:${_apiPort}/api`;
    const THUMB = `${window.location.protocol}//${_host}:${_apiPort}/thumbnails`;
    const WS_URL = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${_host}:${_apiPort}/ws`;

    // Auth token (set via URL param ?token=xxx or leave empty for dev mode)
    const API_TOKEN = new URLSearchParams(window.location.search).get('token') || '';

    /** Authenticated fetch wrapper — injects Bearer token if configured */
    function apiFetch(url, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (API_TOKEN) headers['Authorization'] = `Bearer ${API_TOKEN}`;
      return fetch(url, { ...options, headers });
    }

    // ─── Icons (inline SVG) ──────────────────────────────────
    const Icons = {
      search: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
      globe: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
      code: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
      api: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>,
      gear: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
      chart: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
      bell: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
      send: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
      plus: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      sidebar: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>,
      home: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>,
      clock: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      check: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
      play: <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
      pause: <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
      layers: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
      beaker: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4.5 3h15M6 3v7.5l-3.5 8A2 2 0 0 0 4.24 21h15.52a2 2 0 0 0 1.74-2.5L18 10.5V3"/><path d="M8.5 14h7"/></svg>,
      users: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      upload: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      image: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
      zap: <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    };

    // ─── Model Badge (Perplexity style) ──────────────────────
    function ModelBadge({ model }) {
      const colors = {
        'Meta API': { bg: 'bg-blue-50', text: 'text-blue-600', dot: 'bg-blue-500' },
        'Google API': { bg: 'bg-amber-50', text: 'text-amber-600', dot: 'bg-amber-500' },
        'Optimizer': { bg: 'bg-purple-50', text: 'text-purple-600', dot: 'bg-purple-500' },
        'Notifier': { bg: 'bg-emerald-50', text: 'text-emerald-600', dot: 'bg-emerald-500' },
        'Collector': { bg: 'bg-rose-50', text: 'text-rose-600', dot: 'bg-rose-500' },
      };
      const c = colors[model] || { bg: 'bg-gray-50', text: 'text-gray-600', dot: 'bg-gray-500' };
      return (
        <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${c.bg} ${c.text}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
          {model}
        </span>
      );
    }

    // ─── Subagent Step (Perplexity "Running Subagents" style) ─
    function SubagentStep({ icon, text, model, status, delay }) {
      return (
        <div className="flex items-start gap-3 py-3 animate-in" style={{ animationDelay: `${delay}ms` }}>
          <div className="mt-0.5 text-ppl-sub">{icon}</div>
          <div className="flex-1 min-w-0">
            <span className={`text-base leading-relaxed ${status === 'running' ? 'typing-cursor' : ''}`}>
              {status === 'running' && <span className="text-ppl-teal font-medium">{text.slice(0, 8)}</span>}
              {status === 'running' ? text.slice(8) : text}
              {status === 'done' && ':'}
            </span>
            {model && <span className="ml-3"><ModelBadge model={model} /></span>}
          </div>
          {status === 'done' && <span className="text-emerald-500 mt-1">{Icons.check}</span>}
          {status === 'running' && <span className="w-2 h-2 rounded-full bg-ppl-teal pulse-dot mt-2"></span>}
        </div>
      );
    }

    // ─── File Card (Perplexity attachment style) ─────────────
    function FileCard({ name, size, icon }) {
      return (
        <div className="inline-flex items-center gap-3 px-4 py-3 rounded-xl border border-ppl-border bg-white hover:bg-ppl-hover transition-colors cursor-pointer">
          <span className="text-ppl-sub">{icon || Icons.chart}</span>
          <div>
            <p className="text-sm font-medium text-ppl-text">{name}</p>
            {size && <p className="text-xs text-ppl-sub">{size}</p>}
          </div>
        </div>
      );
    }

    // ─── KPI Inline Card (Perplexity clean style) ────────────
    function KPIRow({ label, value, change, good }) {
      return (
        <div className="flex items-center justify-between py-2.5 border-b border-ppl-border last:border-0">
          <span className="text-sm text-ppl-sub">{label}</span>
          <div className="flex items-center gap-2">
            <span className="text-base font-semibold">{value}</span>
            {change !== undefined && (
              <span className={`text-xs font-medium px-1.5 py-0.5 rounded ${good ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}>
                {change >= 0 ? '+' : ''}{change.toFixed(1)}%
              </span>
            )}
          </div>
        </div>
      );
    }

    // ─── Campaign Row (clean Perplexity style) ───────────────
    function CampaignRow({ campaign, onStatusChange }) {
      const c = campaign;
      return (
        <div className="flex items-center gap-4 py-3 border-b border-ppl-border last:border-0 hover:bg-ppl-hover rounded-lg px-3 -mx-3 transition-colors">
          <span className={`shrink-0 px-2 py-0.5 rounded-md text-xs font-medium ${c.platform === 'meta' ? 'bg-blue-50 text-blue-700' : 'bg-amber-50 text-amber-700'}`}>
            {c.platform === 'meta' ? 'Meta' : 'Google'}
          </span>
          <div className="flex-1 min-w-0">
            <p className="text-sm font-medium truncate">{c.name}</p>
            <p className="text-xs text-ppl-sub">7일 ROAS {(c.week_roas || 0).toFixed(2)} · CPA ₩{krwFmt.format(Math.round(c.today_spend && c.today_conversions ? c.today_spend / c.today_conversions : 0))}</p>
          </div>
          <div className="text-right shrink-0">
            <p className="text-sm font-medium">₩{krwFmt.format(Math.round(c.today_spend || 0))}</p>
            <p className="text-xs text-ppl-sub">7일 지출</p>
          </div>
          <div className="flex items-center gap-1.5 shrink-0">
            <span className={`w-1.5 h-1.5 rounded-full ${c.status === 'ACTIVE' ? 'bg-emerald-500' : 'bg-amber-400'}`}></span>
            <button
              onClick={() => onStatusChange(c.id, c.status === 'ACTIVE' ? 'PAUSED' : 'ACTIVE')}
              className="p-1.5 rounded-lg hover:bg-gray-100 text-ppl-sub transition-colors"
              title={c.status === 'ACTIVE' ? 'Pause' : 'Resume'}
            >
              {c.status === 'ACTIVE' ? Icons.pause : Icons.play}
            </button>
          </div>
        </div>
      );
    }

    // ─── Alert Item (clean) ──────────────────────────────────
    function AlertItem({ alert }) {
      const typeLabel = {
        creative_low_roas: '소재 저성과',
      };
      const severityStyles = {
        critical: 'border-l-red-500 bg-red-50/50',
        warning:  'border-l-amber-500 bg-amber-50/50',
        info:     'border-l-blue-500 bg-blue-50/50',
      };
      return (
        <div className={`px-4 py-3 rounded-lg border-l-3 ${severityStyles[alert.severity] || severityStyles.info} mb-2`} style={{borderLeftWidth: '3px'}}>
          {typeLabel[alert.alert_type] && (
            <span className="inline-block text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-200 text-amber-800 mb-1">{typeLabel[alert.alert_type]}</span>
          )}
          <p className="text-sm whitespace-pre-line">{alert.message}</p>
          <p className="text-xs text-ppl-sub mt-1 flex items-center gap-1">{Icons.clock} {alert.created_at}</p>
        </div>
      );
    }

    // ─── Chat Message ────────────────────────────────────────
    function ChatMessage({ role, children }) {
      if (role === 'user') {
        return (
          <div className="mb-8 animate-in">
            <div className="max-w-2xl mx-auto">
              <div className="bg-white rounded-2xl border border-ppl-border px-5 py-4 shadow-sm">
                {children}
              </div>
            </div>
          </div>
        );
      }
      return (
        <div className="mb-8 animate-in">
          <div className="max-w-4xl mx-auto">
            {children}
          </div>
        </div>
      );
    }

    // ─── Perplexity-style Chart Tooltip ──────────────────────
    function CustomTooltip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      return (
        <div className="bg-white rounded-xl shadow-lg border border-ppl-border px-4 py-3">
          <p className="text-xs text-ppl-sub mb-1">{label}</p>
          {payload.map((p, i) => (
            <p key={i} className="text-sm font-medium" style={{ color: p.color }}>
              {p.name}: {typeof p.value === 'number' ? krwFmt.format(p.value) : p.value}
            </p>
          ))}
        </div>
      );
    }

      // ─── Meta Direct Upload Form (defined outside App to prevent remount on re-render) ───
      const MetaDirectUploadForm = ({ setMetaTab, campaigns }) => {
        const EMPTY = {
          name: '', campaignId: '', adSetId: '', pageId: '', instagramAccountId: '',
          conversionEvent: '',
          message: '', headline: '', description: '',
          link: '', imageUrl: '', mediaPath: '',
          callToAction: 'LEARN_MORE', adStatus: 'PAUSED',
          abGroup: '', persona_tag: '', desire_tag: '', awareness_stage: '',
        };
        const CTA_OPTIONS = [
          { value: 'LEARN_MORE', label: '더 알아보기' },
          { value: 'SHOP_NOW', label: '지금 쇼핑하기' },
          { value: 'SIGN_UP', label: '가입하기' },
          { value: 'DOWNLOAD', label: '다운로드' },
          { value: 'BOOK_TRAVEL', label: '예약하기' },
          { value: 'CONTACT_US', label: '문의하기' },
          { value: 'GET_OFFER', label: '혜택 받기' },
          { value: 'SUBSCRIBE', label: '구독하기' },
          { value: 'WATCH_MORE', label: '더 보기' },
          { value: 'NO_BUTTON', label: '버튼 없음' },
        ];
        const CONVERSION_EVENTS = [
          { value: 'PURCHASE',              label: '구매 (Purchase)' },
          { value: 'INITIATE_CHECKOUT',     label: '결제 시작 (Initiate Checkout)' },
          { value: 'ADD_TO_CART',           label: '장바구니 추가 (Add to Cart)' },
          { value: 'ADD_PAYMENT_INFO',      label: '결제 정보 추가 (Add Payment Info)' },
          { value: 'VIEW_CONTENT',          label: '콘텐츠 조회 (View Content)' },
          { value: 'SEARCH',               label: '검색 (Search)' },
          { value: 'LEAD',                  label: '리드 (Lead)' },
          { value: 'COMPLETE_REGISTRATION', label: '가입 완료 (Complete Registration)' },
          { value: 'SUBSCRIBE',             label: '구독 (Subscribe)' },
          { value: 'CONTACT',               label: '문의 (Contact)' },
        ];
        const [df, setDf] = useState(EMPTY);
        const [imgMode, setImgMode] = useState('drop');
        const [dragOver, setDragOver] = useState(false);
        const [uploadedImage, setUploadedImage] = useState(null);
        const [imgUploading, setImgUploading] = useState(false);
        const [imgUploadError, setImgUploadError] = useState('');
        const fileInputRef = React.useRef(null);
        const [dStatus, setDStatus] = useState(null);
        const [dError, setDError] = useState('');
        const [dResult, setDResult] = useState(null);
        const [adSets, setAdSets] = useState([]);
        const [adSetsLoading, setAdSetsLoading] = useState(false);
        const [pages, setPages] = useState([]);
        const [pagesLoading, setPagesLoading] = useState(false);
        const [igAccounts, setIgAccounts] = useState([]);
        const [igLoading, setIgLoading] = useState(false);
        const set = (k, v) => setDf(prev => ({ ...prev, [k]: v }));

        // ── 프리셋 관리 (localStorage) ──
        const PRESET_KEYS = ['campaignId', 'adSetId', 'pageId', 'instagramAccountId', 'link', 'callToAction', 'conversionEvent', 'adStatus'];
        const [presets, setPresets] = useState(() => {
          try { return JSON.parse(localStorage.getItem('meta_creative_presets') || '{}'); }
          catch { return {}; }
        });
        const [presetName, setPresetName] = useState('');
        const [selectedPreset, setSelectedPreset] = useState('');

        const savePreset = () => {
          const name = presetName.trim();
          if (!name) return;
          const entry = Object.fromEntries(PRESET_KEYS.map(k => [k, df[k]]));
          const updated = { ...presets, [name]: entry };
          setPresets(updated);
          localStorage.setItem('meta_creative_presets', JSON.stringify(updated));
          setPresetName('');
        };

        const pendingAdSetId = React.useRef(null);

        const loadPreset = (name) => {
          if (!name || !presets[name]) { setSelectedPreset(''); return; }
          setSelectedPreset(name);
          const entry = presets[name];
          // adSetId는 광고세트 목록 로드 후 적용
          pendingAdSetId.current = entry.adSetId || null;
          setDf(prev => ({ ...prev, ...entry, adSetId: '' }));
          setAdSets([]);
        };

        const deletePreset = (name) => {
          const updated = { ...presets };
          delete updated[name];
          setPresets(updated);
          localStorage.setItem('meta_creative_presets', JSON.stringify(updated));
          if (selectedPreset === name) setSelectedPreset('');
        };

        useEffect(() => {
          setPagesLoading(true);
          apiFetch(`${API}/meta/pages`)
            .then(r => r.json())
            .then(data => { setPages(Array.isArray(data) ? data : []); setPagesLoading(false); })
            .catch(() => setPagesLoading(false));

          setIgLoading(true);
          apiFetch(`${API}/meta/instagram-accounts`)
            .then(r => r.json())
            .then(data => { setIgAccounts(Array.isArray(data) ? data : []); setIgLoading(false); })
            .catch(() => setIgLoading(false));
        }, []);

        useEffect(() => {
          if (!df.campaignId) { setAdSets([]); set('adSetId', ''); return; }
          setAdSetsLoading(true);
          setAdSets([]);
          set('adSetId', '');
          apiFetch(`${API}/meta/campaigns/${df.campaignId}/adsets`)
            .then(r => r.json())
            .then(data => {
              const list = Array.isArray(data) ? data : [];
              setAdSets(list);
              setAdSetsLoading(false);
              // 프리셋 로드 후 adSetId 복원
              if (pendingAdSetId.current) {
                const match = list.find(a => a.id === pendingAdSetId.current);
                if (match) set('adSetId', pendingAdSetId.current);
                pendingAdSetId.current = null;
              }
            })
            .catch(() => { setAdSetsLoading(false); pendingAdSetId.current = null; });
        }, [df.campaignId]);

        const handleImageUpload = async (file) => {
          if (!file || !file.type.startsWith('image/')) {
            setImgUploadError('이미지 파일만 업로드 가능합니다'); return;
          }
          setImgUploading(true); setImgUploadError(''); setUploadedImage(null);
          const formData = new FormData();
          formData.append('image', file);
          try {
            const res = await fetch(`${API}/meta/upload-image`, {
              method: 'POST',
              ...(API_TOKEN ? { headers: { Authorization: `Bearer ${API_TOKEN}` } } : {}),
              body: formData,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '업로드 실패');
            setUploadedImage(data);
          } catch (e) {
            setImgUploadError(e.message);
          } finally { setImgUploading(false); }
        };

        const handleDrop = (e) => {
          e.preventDefault(); setDragOver(false);
          const file = e.dataTransfer.files[0];
          if (file) handleImageUpload(file);
        };

        const handleSubmit = async () => {
          setDStatus('loading'); setDError(''); setDResult(null);
          try {
            const body = {
              name: df.name, pageId: df.pageId, adSetId: df.adSetId,
              campaignId: df.campaignId, message: df.message, link: df.link,
              callToAction: df.callToAction, adStatus: df.adStatus,
              ...(df.instagramAccountId && { instagramAccountId: df.instagramAccountId }),
              ...(df.conversionEvent && { conversionEvent: df.conversionEvent }),
              ...(df.headline && { headline: df.headline }),
              ...(df.description && { description: df.description }),
              ...(imgMode === 'drop' && uploadedImage?.hash && { imageHash: uploadedImage.hash }),
              ...(imgMode === 'url' && df.imageUrl && { imageUrl: df.imageUrl }),
              ...(imgMode === 'path' && df.mediaPath && { mediaPath: df.mediaPath }),
              ...(df.abGroup && { abGroup: df.abGroup }),
              ...(df.persona_tag && { persona_tag: df.persona_tag }),
              ...(df.desire_tag && { desire_tag: df.desire_tag }),
              ...(df.awareness_stage && { awareness_stage: df.awareness_stage }),
            };
            const res = await apiFetch(`${API}/meta/creative/direct`, {
              method: 'POST', body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '등록 실패');
            setDResult(data);
            setDStatus('success');
            setDf(EMPTY);
          } catch (e) {
            setDError(e.message);
            setDStatus('error');
          }
        };

        const isValid = df.name && df.pageId && df.adSetId && df.campaignId && df.message && df.link;

        return (
          <div className="max-w-2xl space-y-5">

            {/* ── 프리셋 카드 ── */}
            <div className="bg-white rounded-2xl border border-ppl-border shadow-sm p-5 space-y-3">
              <p className="text-sm font-semibold text-ppl-text flex items-center gap-2">
                <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className="text-violet-500">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
                프리셋
                <span className="text-xs font-normal text-ppl-sub">— 자주 쓰는 캠페인/페이지/CTA 조합을 저장·불러오기</span>
              </p>

              {/* 불러오기 행 */}
              <div className="flex gap-2">
                <select value={selectedPreset} onChange={e => loadPreset(e.target.value)}
                  className="flex-1 text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                  <option value="">-- 저장된 프리셋 선택 --</option>
                  {Object.keys(presets).map(name => (
                    <option key={name} value={name}>{name}</option>
                  ))}
                </select>
                {selectedPreset && (
                  <button onClick={() => deletePreset(selectedPreset)}
                    title="이 프리셋 삭제"
                    className="px-3 py-2 rounded-lg border border-red-200 text-red-500 hover:bg-red-50 text-xs font-medium transition-colors">
                    삭제
                  </button>
                )}
              </div>

              {/* 저장 행 */}
              <div className="flex gap-2">
                <input type="text" placeholder="프리셋 이름 (예: 봄_프로모션_구매캠)"
                  value={presetName} onChange={e => setPresetName(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') savePreset(); }}
                  className="flex-1 text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
                <button onClick={savePreset} disabled={!presetName.trim()}
                  className="px-4 py-2 rounded-lg bg-violet-500 text-white text-xs font-semibold hover:bg-violet-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors whitespace-nowrap">
                  현재 설정 저장
                </button>
              </div>
              {Object.keys(presets).length > 0 && (
                <p className="text-xs text-ppl-sub">저장된 프리셋: {Object.keys(presets).join(', ')}</p>
              )}
            </div>

            <div className="bg-white rounded-2xl border border-ppl-border shadow-sm p-6 space-y-4">
              <p className="text-sm font-semibold text-ppl-text flex items-center gap-2">
                <span className="w-5 h-5 rounded-full bg-blue-500 text-white text-[10px] font-bold flex items-center justify-center">1</span>
                기본 정보
              </p>
              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">소재명 (광고 이름) *</label>
                <input type="text" placeholder="예: 봄_프로모션_배너_v1"
                  value={df.name} onChange={e => set('name', e.target.value)}
                  className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
              </div>
              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">캠페인 *</label>
                {(() => {
                  const metaCampaigns = campaigns.filter(c => c.platform === 'meta');
                  return metaCampaigns.length === 0 ? (
                    <div className="w-full text-sm border border-amber-200 rounded-lg px-3 py-2 bg-amber-50 text-amber-600">
                      Meta 캠페인이 없습니다 — 먼저 캠페인을 생성하세요
                    </div>
                  ) : (
                    <select value={df.campaignId} onChange={e => set('campaignId', e.target.value)}
                      className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                      <option value="">-- 캠페인 선택 ({metaCampaigns.length}개) --</option>
                      {metaCampaigns.map(c => (
                        <option key={c.id} value={c.id}>{c.name} · {c.status || c.effective_status || ''}</option>
                      ))}
                    </select>
                  );
                })()}
              </div>
              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">광고 세트 (Ad Set) *</label>
                {!df.campaignId ? (
                  <div className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-ppl-bg text-ppl-sub">캠페인을 먼저 선택하세요</div>
                ) : adSetsLoading ? (
                  <div className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-ppl-bg text-ppl-sub flex items-center gap-2">
                    <span className="w-3 h-3 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span>
                    불러오는 중...
                  </div>
                ) : adSets.length === 0 ? (
                  <div className="w-full text-sm border border-amber-200 rounded-lg px-3 py-2 bg-amber-50 text-amber-600">이 캠페인에 광고 세트가 없습니다</div>
                ) : (
                  <select value={df.adSetId} onChange={e => set('adSetId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="">-- 광고 세트 선택 --</option>
                    {adSets.map(a => (
                      <option key={a.id} value={a.id}>{a.name} ({a.status})</option>
                    ))}
                  </select>
                )}
              </div>
              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">Instagram / Threads 계정 <span className="text-ppl-sub font-normal">(선택)</span></label>
                {igLoading ? (
                  <div className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-ppl-bg text-ppl-sub flex items-center gap-2">
                    <span className="w-3 h-3 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span>
                    불러오는 중...
                  </div>
                ) : igAccounts.length === 0 ? (
                  <input type="text" placeholder="Instagram 계정 ID 직접 입력"
                    value={df.instagramAccountId} onChange={e => set('instagramAccountId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white font-mono" />
                ) : (
                  <select value={df.instagramAccountId} onChange={e => set('instagramAccountId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="">-- 선택 안 함 (Facebook 페이지로만 게재) --</option>
                    {igAccounts.map(a => (
                      <option key={a.id} value={a.id}>@{a.username} — {a.name}</option>
                    ))}
                  </select>
                )}
                <p className="text-xs text-ppl-sub mt-1">선택 시 Instagram·Threads 지면에도 해당 계정으로 게재됩니다.</p>
              </div>
              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">전환 이벤트 <span className="text-ppl-sub font-normal">(선택)</span></label>
                <select value={df.conversionEvent} onChange={e => set('conversionEvent', e.target.value)}
                  className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                  <option value="">-- 선택 안 함 --</option>
                  {CONVERSION_EVENTS.map(ev => (
                    <option key={ev.value} value={ev.value}>{ev.label}</option>
                  ))}
                </select>
                <p className="text-xs text-ppl-sub mt-1">픽셀에 연결된 전환 이벤트를 기준으로 광고 성과를 최적화합니다.</p>
              </div>
              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">Facebook 페이지 *</label>
                {pagesLoading ? (
                  <div className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-ppl-bg text-ppl-sub flex items-center gap-2">
                    <span className="w-3 h-3 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span>
                    불러오는 중...
                  </div>
                ) : pages.length === 0 ? (
                  <input type="text" placeholder="페이지 ID 직접 입력"
                    value={df.pageId} onChange={e => set('pageId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white font-mono" />
                ) : (
                  <select value={df.pageId} onChange={e => set('pageId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="">-- 페이지 선택 --</option>
                    {pages.map(p => (
                      <option key={p.id} value={p.id}>{p.name}</option>
                    ))}
                  </select>
                )}
              </div>
            </div>

            <div className="bg-white rounded-2xl border border-ppl-border shadow-sm p-6 space-y-4">
              <p className="text-sm font-semibold text-ppl-text flex items-center gap-2">
                <span className="w-5 h-5 rounded-full bg-blue-500 text-white text-[10px] font-bold flex items-center justify-center">2</span>
                이미지
              </p>
              <div className="flex gap-1 bg-ppl-bg rounded-lg p-1 w-fit">
                {[['drop','파일 업로드'],['url','이미지 URL'],['path','로컬 경로']].map(([v, l]) => (
                  <button key={v} onClick={() => { setImgMode(v); setUploadedImage(null); setImgUploadError(''); }}
                    className={`px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${imgMode === v ? 'bg-white text-ppl-text shadow-sm' : 'text-ppl-sub hover:text-ppl-text'}`}>{l}</button>
                ))}
              </div>
              {imgMode === 'drop' && (
                <div>
                  {!uploadedImage ? (
                    <div
                      onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                      onDragLeave={() => setDragOver(false)}
                      onDrop={handleDrop}
                      onClick={() => fileInputRef.current?.click()}
                      className={`relative flex flex-col items-center justify-center w-full h-44 rounded-2xl border-2 border-dashed cursor-pointer transition-all ${
                        dragOver ? 'border-blue-400 bg-blue-50' : 'border-ppl-border bg-ppl-bg hover:bg-gray-50 hover:border-blue-300'
                      }`}
                    >
                      <input ref={fileInputRef} type="file" accept="image/*" className="hidden"
                        onChange={e => { if (e.target.files[0]) handleImageUpload(e.target.files[0]); }} />
                      {imgUploading ? (
                        <div className="flex flex-col items-center gap-2 text-ppl-sub">
                          <span className="w-8 h-8 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span>
                          <span className="text-sm">Meta에 업로드 중...</span>
                        </div>
                      ) : (
                        <div className="flex flex-col items-center gap-2 text-ppl-sub pointer-events-none">
                          <svg width="36" height="36" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                          </svg>
                          <p className="text-sm font-medium text-ppl-text">이미지를 드래그하거나 클릭해서 업로드</p>
                          <p className="text-xs">JPG, PNG, GIF · 최대 30MB</p>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div className="flex items-start gap-4 p-4 bg-emerald-50 border border-emerald-200 rounded-2xl">
                      <img src={uploadedImage.url} alt="uploaded"
                        className="w-24 h-24 object-cover rounded-xl border border-emerald-200 shrink-0"
                        onError={e => { e.target.style.display='none'; }} />
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-semibold text-emerald-700 mb-1">Meta 업로드 완료</p>
                        <p className="text-xs text-emerald-600 truncate">{uploadedImage.filename}</p>
                        <p className="text-xs font-mono text-emerald-600 mt-1 break-all">hash: {uploadedImage.hash}</p>
                      </div>
                      <button onClick={() => { setUploadedImage(null); setImgUploadError(''); }}
                        className="text-emerald-400 hover:text-red-500 transition-colors text-lg leading-none">×</button>
                    </div>
                  )}
                  {imgUploadError && (
                    <p className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2 mt-2">{imgUploadError}</p>
                  )}
                </div>
              )}
              {imgMode === 'url' && (
                <div>
                  <label className="block text-xs font-medium text-ppl-text mb-1.5">이미지 URL (공개 접근 가능한 URL)</label>
                  <input type="url" placeholder="https://example.com/image.jpg"
                    value={df.imageUrl} onChange={e => set('imageUrl', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
                  {df.imageUrl && (
                    <div className="mt-2 w-32 h-20 rounded-lg border border-ppl-border overflow-hidden bg-ppl-bg">
                      <img src={df.imageUrl} alt="preview" className="w-full h-full object-cover"
                        onError={e => { e.target.style.display='none'; }} />
                    </div>
                  )}
                </div>
              )}
              {imgMode === 'path' && (
                <div>
                  <label className="block text-xs font-medium text-ppl-text mb-1.5">서버 로컬 파일 경로</label>
                  <input type="text" placeholder="C:\images\banner.jpg"
                    value={df.mediaPath} onChange={e => set('mediaPath', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white font-mono" />
                  <p className="text-xs text-ppl-sub mt-1">서버에서 접근 가능한 절대 경로를 입력하세요.</p>
                </div>
              )}
            </div>

            <div className="bg-white rounded-2xl border border-ppl-border shadow-sm p-6 space-y-4">
              <p className="text-sm font-semibold text-ppl-text flex items-center gap-2">
                <span className="w-5 h-5 rounded-full bg-blue-500 text-white text-[10px] font-bold flex items-center justify-center">3</span>
                광고 문구
              </p>
              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">
                  주요 텍스트 (Primary Text) *
                  <span className="ml-1 text-ppl-sub font-normal">— 피드에 표시되는 본문</span>
                </label>
                <textarea rows={4} placeholder="예: 지금 봄 시즌 특별 할인! 최대 50% 혜택을 놓치지 마세요."
                  value={df.message} onChange={e => set('message', e.target.value)}
                  className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white resize-none" />
                <p className="text-xs text-ppl-sub mt-1">{df.message.length}자</p>
              </div>
            </div>

            <div className="bg-white rounded-2xl border border-ppl-border shadow-sm p-6 space-y-4">
              <p className="text-sm font-semibold text-ppl-text flex items-center gap-2">
                <span className="w-5 h-5 rounded-full bg-blue-500 text-white text-[10px] font-bold flex items-center justify-center">4</span>
                링크 &amp; CTA
              </p>
              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">웹사이트 URL (랜딩 페이지) *</label>
                <input type="url" placeholder="https://example.com/landing"
                  value={df.link} onChange={e => set('link', e.target.value)}
                  className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-medium text-ppl-text mb-1.5">CTA 버튼</label>
                  <select value={df.callToAction} onChange={e => set('callToAction', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    {CTA_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-ppl-text mb-1.5">광고 상태</label>
                  <select value={df.adStatus} onChange={e => set('adStatus', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="PAUSED">일시정지 (PAUSED)</option>
                    <option value="ACTIVE">활성 (ACTIVE)</option>
                  </select>
                </div>
              </div>
            </div>

            {dStatus === 'error' && (
              <div className="text-sm text-red-600 bg-red-50 border border-red-100 rounded-xl px-4 py-3">{dError}</div>
            )}
            {dStatus === 'success' && dResult && (
              <div className="text-sm text-emerald-700 bg-emerald-50 border border-emerald-100 rounded-xl px-4 py-3 space-y-1">
                <p className="font-semibold">등록 완료!</p>
                <p className="text-xs">Ad ID: <span className="font-mono">{dResult.adId}</span></p>
                <p className="text-xs">Meta Creative ID: <span className="font-mono">{dResult.metaCreativeId}</span></p>
              </div>
            )}

            <button onClick={handleSubmit} disabled={dStatus === 'loading' || !isValid}
              className="w-full py-3 rounded-xl bg-blue-500 text-white text-sm font-semibold hover:bg-blue-600 transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-sm">
              {dStatus === 'loading' ? (
                <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>Meta에 등록 중...</>
              ) : (
                <>{Icons.upload} Meta에 광고 등록</>
              )}
            </button>
            <p className="text-xs text-center text-ppl-sub">* 표시 항목은 필수입니다. 광고는 기본적으로 일시정지 상태로 등록됩니다.</p>
          </div>
        );
      };

      // ─── Meta Creative Settings Panel (defined outside App to prevent remount) ───
      // ─── Meta Bulk Upload Form ───
      const MetaBulkUploadForm = ({ campaigns }) => {
        const CTA_OPTIONS = [
          { value: 'LEARN_MORE', label: '더 알아보기' },
          { value: 'SHOP_NOW', label: '지금 쇼핑하기' },
          { value: 'SIGN_UP', label: '가입하기' },
          { value: 'DOWNLOAD', label: '다운로드' },
          { value: 'BOOK_TRAVEL', label: '예약하기' },
          { value: 'CONTACT_US', label: '문의하기' },
          { value: 'GET_OFFER', label: '혜택 받기' },
          { value: 'SUBSCRIBE', label: '구독하기' },
          { value: 'WATCH_MORE', label: '더 보기' },
          { value: 'NO_BUTTON', label: '버튼 없음' },
        ];
        const CONVERSION_EVENTS = [
          { value: 'PURCHASE',              label: '구매 (Purchase)' },
          { value: 'INITIATE_CHECKOUT',     label: '결제 시작 (Initiate Checkout)' },
          { value: 'ADD_TO_CART',           label: '장바구니 추가 (Add to Cart)' },
          { value: 'ADD_PAYMENT_INFO',      label: '결제 정보 추가 (Add Payment Info)' },
          { value: 'VIEW_CONTENT',          label: '콘텐츠 조회 (View Content)' },
          { value: 'SEARCH',                label: '검색 (Search)' },
          { value: 'LEAD',                  label: '리드 (Lead)' },
          { value: 'COMPLETE_REGISTRATION', label: '가입 완료 (Complete Registration)' },
          { value: 'SUBSCRIBE',             label: '구독 (Subscribe)' },
          { value: 'CONTACT',               label: '문의 (Contact)' },
        ];

        const [cfg, setCfg] = useState({
          campaignId: '', adSetId: '', pageId: '', instagramAccountId: '',
          conversionEvent: '', message: '', headline: '', description: '',
          link: '', callToAction: 'LEARN_MORE', adStatus: 'PAUSED',
        });
        const setC = (k, v) => setCfg(prev => ({ ...prev, [k]: v }));

        const [adSets, setAdSets] = useState([]);
        const [adSetsLoading, setAdSetsLoading] = useState(false);
        const [pages, setPages] = useState([]);
        const [pagesLoading, setPagesLoading] = useState(false);
        const [igAccounts, setIgAccounts] = useState([]);
        const [igLoading, setIgLoading] = useState(false);

        const [queue, setQueue] = useState([]);
        const [isRunning, setIsRunning] = useState(false);
        const [summary, setSummary] = useState(null);
        const [dragOver, setDragOver] = useState(false);
        const fileInputRef = React.useRef(null);

        useEffect(() => {
          setPagesLoading(true);
          apiFetch(`${API}/meta/pages`)
            .then(r => r.json())
            .then(data => { setPages(Array.isArray(data) ? data : []); setPagesLoading(false); })
            .catch(() => setPagesLoading(false));
          setIgLoading(true);
          apiFetch(`${API}/meta/instagram-accounts`)
            .then(r => r.json())
            .then(data => { setIgAccounts(Array.isArray(data) ? data : []); setIgLoading(false); })
            .catch(() => setIgLoading(false));
        }, []);

        useEffect(() => {
          if (!cfg.campaignId) { setAdSets([]); setC('adSetId', ''); return; }
          setAdSetsLoading(true);
          setAdSets([]);
          setC('adSetId', '');
          apiFetch(`${API}/meta/campaigns/${cfg.campaignId}/adsets`)
            .then(r => r.json())
            .then(data => { setAdSets(Array.isArray(data) ? data : []); setAdSetsLoading(false); })
            .catch(() => setAdSetsLoading(false));
        }, [cfg.campaignId]);

        const addFiles = (files) => {
          const newItems = Array.from(files)
            .filter(f => f.type.startsWith('image/'))
            .map(f => ({
              id: `q_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
              name: f.name.replace(/\.[^/.]+$/, ''),
              file: f,
              preview: URL.createObjectURL(f),
              status: 'pending',
              adId: null,
              error: null,
            }));
          if (newItems.length > 0) { setQueue(prev => [...prev, ...newItems]); setSummary(null); }
        };

        const removeItem = (id) => setQueue(prev => prev.filter(i => i.id !== id));
        const updateItem = (id, updates) => setQueue(prev => prev.map(i => i.id === id ? { ...i, ...updates } : i));
        const renameItem = (id, name) => updateItem(id, { name });

        const handleDrop = (e) => { e.preventDefault(); setDragOver(false); addFiles(e.dataTransfer.files); };

        const handleBulkSubmit = async () => {
          const pending = queue.filter(i => i.status === 'pending');
          if (!pending.length || !isConfigValid) return;
          setIsRunning(true);
          setSummary(null);
          let success = 0, failed = 0;

          for (const item of pending) {
            updateItem(item.id, { status: 'uploading', error: null });
            try {
              const formData = new FormData();
              formData.append('image', item.file);
              const uploadRes = await fetch(`${API}/meta/upload-image`, {
                method: 'POST',
                ...(API_TOKEN ? { headers: { Authorization: `Bearer ${API_TOKEN}` } } : {}),
                body: formData,
              });
              const uploadData = await uploadRes.json();
              if (!uploadRes.ok) throw new Error(uploadData.error || '이미지 업로드 실패');

              const body = {
                name: item.name,
                pageId: cfg.pageId, adSetId: cfg.adSetId, campaignId: cfg.campaignId,
                message: cfg.message, link: cfg.link,
                callToAction: cfg.callToAction, adStatus: cfg.adStatus,
                imageHash: uploadData.hash,
                ...(cfg.instagramAccountId && { instagramAccountId: cfg.instagramAccountId }),
                ...(cfg.conversionEvent && { conversionEvent: cfg.conversionEvent }),
                ...(cfg.headline && { headline: cfg.headline }),
                ...(cfg.description && { description: cfg.description }),
              };
              const adRes = await apiFetch(`${API}/meta/creative/direct`, {
                method: 'POST', body: JSON.stringify(body),
              });
              const adData = await adRes.json();
              if (!adRes.ok) throw new Error(adData.error || '광고 등록 실패');

              updateItem(item.id, { status: 'registered', adId: adData.adId });
              success++;
            } catch (e) {
              updateItem(item.id, { status: 'error', error: e.message });
              failed++;
            }
          }
          setIsRunning(false);
          setSummary({ success, failed, total: pending.length });
        };

        const isConfigValid = cfg.campaignId && cfg.adSetId && cfg.pageId && cfg.message && cfg.link;
        const pendingCount = queue.filter(i => i.status === 'pending').length;
        const metaCampaigns = campaigns.filter(c => c.platform === 'meta');

        const statusBadge = (status) => {
          const map = {
            pending:    { cls: 'bg-gray-100 text-gray-500',     label: '대기중' },
            uploading:  { cls: 'bg-blue-100 text-blue-600',     label: '업로드 중' },
            registered: { cls: 'bg-emerald-100 text-emerald-700', label: '등록 완료' },
            error:      { cls: 'bg-red-100 text-red-600',       label: '오류' },
          };
          const s = map[status] || map.pending;
          return (
            <span className={`inline-flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-full ${s.cls}`}>
              {status === 'uploading' && <span className="w-2 h-2 border border-blue-500 border-t-transparent rounded-full animate-spin"></span>}
              {s.label}
            </span>
          );
        };

        return (
          <div className="max-w-2xl space-y-5">
            {/* ── 고정 설정 카드 ── */}
            <div className="bg-white rounded-2xl border border-ppl-border shadow-sm p-6 space-y-4">
              <p className="text-sm font-semibold text-ppl-text flex items-center gap-2">
                <span className="w-5 h-5 rounded-full bg-violet-500 text-white text-[10px] font-bold flex items-center justify-center">1</span>
                고정 설정
                <span className="text-xs font-normal text-ppl-sub">— 아래 모든 소재에 공통 적용됩니다</span>
              </p>

              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">캠페인 *</label>
                {metaCampaigns.length === 0 ? (
                  <div className="w-full text-sm border border-amber-200 rounded-lg px-3 py-2 bg-amber-50 text-amber-600">Meta 캠페인이 없습니다 — 먼저 캠페인을 생성하세요</div>
                ) : (
                  <select value={cfg.campaignId} onChange={e => setC('campaignId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="">-- 캠페인 선택 ({metaCampaigns.length}개) --</option>
                    {metaCampaigns.map(c => <option key={c.id} value={c.id}>{c.name} · {c.status || c.effective_status || ''}</option>)}
                  </select>
                )}
              </div>

              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">광고 세트 (Ad Set) *</label>
                {!cfg.campaignId ? (
                  <div className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-ppl-bg text-ppl-sub">캠페인을 먼저 선택하세요</div>
                ) : adSetsLoading ? (
                  <div className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-ppl-bg text-ppl-sub flex items-center gap-2">
                    <span className="w-3 h-3 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span>불러오는 중...
                  </div>
                ) : adSets.length === 0 ? (
                  <div className="w-full text-sm border border-amber-200 rounded-lg px-3 py-2 bg-amber-50 text-amber-600">이 캠페인에 광고 세트가 없습니다</div>
                ) : (
                  <select value={cfg.adSetId} onChange={e => setC('adSetId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="">-- 광고 세트 선택 --</option>
                    {adSets.map(a => <option key={a.id} value={a.id}>{a.name} ({a.status})</option>)}
                  </select>
                )}
              </div>

              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">Facebook 페이지 *</label>
                {pagesLoading ? (
                  <div className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-ppl-bg text-ppl-sub flex items-center gap-2">
                    <span className="w-3 h-3 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span>불러오는 중...
                  </div>
                ) : pages.length === 0 ? (
                  <input type="text" placeholder="페이지 ID 직접 입력"
                    value={cfg.pageId} onChange={e => setC('pageId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white font-mono" />
                ) : (
                  <select value={cfg.pageId} onChange={e => setC('pageId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="">-- 페이지 선택 --</option>
                    {pages.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                )}
              </div>

              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">Instagram 계정 <span className="text-ppl-sub font-normal">(선택)</span></label>
                {igLoading ? (
                  <div className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-ppl-bg text-ppl-sub flex items-center gap-2">
                    <span className="w-3 h-3 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span>불러오는 중...
                  </div>
                ) : igAccounts.length === 0 ? (
                  <input type="text" placeholder="Instagram 계정 ID (선택)"
                    value={cfg.instagramAccountId} onChange={e => setC('instagramAccountId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white font-mono" />
                ) : (
                  <select value={cfg.instagramAccountId} onChange={e => setC('instagramAccountId', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="">-- 선택 안 함 --</option>
                    {igAccounts.map(a => <option key={a.id} value={a.id}>@{a.username} — {a.name}</option>)}
                  </select>
                )}
              </div>

              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">전환 이벤트 <span className="text-ppl-sub font-normal">(선택)</span></label>
                <select value={cfg.conversionEvent} onChange={e => setC('conversionEvent', e.target.value)}
                  className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                  <option value="">-- 선택 안 함 --</option>
                  {CONVERSION_EVENTS.map(ev => <option key={ev.value} value={ev.value}>{ev.label}</option>)}
                </select>
              </div>

              <hr className="border-ppl-border" />

              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">
                  주요 텍스트 (Primary Text) *
                  <span className="ml-1 text-ppl-sub font-normal">— 피드에 표시되는 본문</span>
                </label>
                <textarea rows={3} placeholder="예: 지금 봄 시즌 특별 할인! 최대 50% 혜택을 놓치지 마세요."
                  value={cfg.message} onChange={e => setC('message', e.target.value)}
                  className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white resize-none" />
                <p className="text-xs text-ppl-sub mt-1">{cfg.message.length}자</p>
              </div>

              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">헤드라인 <span className="text-ppl-sub font-normal">(선택)</span></label>
                <input type="text" placeholder="예: 봄 시즌 특별 할인"
                  value={cfg.headline} onChange={e => setC('headline', e.target.value)}
                  className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
              </div>

              <div>
                <label className="block text-xs font-medium text-ppl-text mb-1.5">웹사이트 URL (랜딩 페이지) *</label>
                <input type="url" placeholder="https://example.com/landing"
                  value={cfg.link} onChange={e => setC('link', e.target.value)}
                  className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-medium text-ppl-text mb-1.5">CTA 버튼</label>
                  <select value={cfg.callToAction} onChange={e => setC('callToAction', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    {CTA_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-ppl-text mb-1.5">광고 상태</label>
                  <select value={cfg.adStatus} onChange={e => setC('adStatus', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white">
                    <option value="PAUSED">일시정지 (PAUSED)</option>
                    <option value="ACTIVE">활성 (ACTIVE)</option>
                  </select>
                </div>
              </div>
            </div>

            {/* ── 이미지 대기열 카드 ── */}
            <div className="bg-white rounded-2xl border border-ppl-border shadow-sm p-6 space-y-4">
              <div className="flex items-center justify-between">
                <p className="text-sm font-semibold text-ppl-text flex items-center gap-2">
                  <span className="w-5 h-5 rounded-full bg-violet-500 text-white text-[10px] font-bold flex items-center justify-center">2</span>
                  이미지 대기열
                  {queue.length > 0 && (
                    <span className="text-xs font-normal text-ppl-sub">({queue.length}개 · 대기 {pendingCount}개)</span>
                  )}
                </p>
                {queue.length > 0 && !isRunning && pendingCount > 0 && (
                  <button onClick={() => setQueue(prev => prev.filter(i => i.status !== 'pending'))}
                    className="text-xs text-red-400 hover:text-red-600 transition-colors">대기중 전체 삭제</button>
                )}
              </div>

              {/* 드롭존 */}
              <div
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}
                onClick={() => fileInputRef.current?.click()}
                className={`flex flex-col items-center justify-center w-full h-32 rounded-2xl border-2 border-dashed cursor-pointer transition-all ${
                  dragOver ? 'border-violet-400 bg-violet-50' : 'border-ppl-border bg-ppl-bg hover:bg-gray-50 hover:border-violet-300'
                }`}
              >
                <input ref={fileInputRef} type="file" accept="image/*" multiple className="hidden"
                  onChange={e => { if (e.target.files.length) addFiles(e.target.files); }} />
                <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24" className="text-ppl-sub mb-1.5">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p className="text-sm font-medium text-ppl-text">이미지를 드래그하거나 클릭해서 추가</p>
                <p className="text-xs text-ppl-sub mt-0.5">여러 파일 동시 선택 가능 · JPG, PNG, GIF</p>
              </div>

              {/* 대기열 리스트 */}
              {queue.length > 0 && (
                <div className="space-y-2 max-h-96 overflow-y-auto pr-1">
                  {queue.map(item => (
                    <div key={item.id} className={`flex items-center gap-3 p-3 rounded-xl border transition-colors ${
                      item.status === 'registered' ? 'bg-emerald-50 border-emerald-200' :
                      item.status === 'error'      ? 'bg-red-50 border-red-200' :
                      item.status === 'uploading'  ? 'bg-blue-50 border-blue-200' :
                      'bg-ppl-bg border-ppl-border'
                    }`}>
                      <img src={item.preview} alt="" className="w-14 h-14 object-cover rounded-lg shrink-0 border border-ppl-border" />
                      <div className="flex-1 min-w-0">
                        {item.status === 'pending' ? (
                          <input type="text" value={item.name} onChange={e => renameItem(item.id, e.target.value)}
                            className="w-full text-sm border border-ppl-border rounded-lg px-2 py-1 bg-white mb-1.5"
                            placeholder="광고 이름" />
                        ) : (
                          <p className="text-sm font-medium text-ppl-text truncate mb-1.5">{item.name}</p>
                        )}
                        <div className="flex items-center gap-2 flex-wrap">
                          {statusBadge(item.status)}
                          {item.adId && <span className="text-[10px] text-ppl-sub font-mono">Ad: {item.adId}</span>}
                          {item.error && <span className="text-[10px] text-red-500 truncate max-w-[180px]" title={item.error}>{item.error}</span>}
                        </div>
                      </div>
                      {(item.status === 'pending' || item.status === 'error') && !isRunning && (
                        <button onClick={() => removeItem(item.id)}
                          className="text-ppl-sub hover:text-red-500 transition-colors text-xl leading-none shrink-0 px-1">×</button>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* 결과 요약 */}
            {summary && (
              <div className={`text-sm rounded-xl px-4 py-3 border ${summary.failed === 0 ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-amber-50 border-amber-100 text-amber-700'}`}>
                <p className="font-semibold mb-0.5">등록 완료 ({summary.total}개 처리)</p>
                <p className="text-xs">성공 {summary.success}개{summary.failed > 0 ? ` · 실패 ${summary.failed}개 (오류 항목을 확인하세요)` : ''}</p>
              </div>
            )}

            {/* 등록 버튼 */}
            <button onClick={handleBulkSubmit}
              disabled={isRunning || !isConfigValid || pendingCount === 0}
              className="w-full py-3 rounded-xl bg-violet-500 text-white text-sm font-semibold hover:bg-violet-600 transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-sm">
              {isRunning ? (
                <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>등록 중...</>
              ) : (
                <>
                  <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                  </svg>
                  {pendingCount > 0 ? `${pendingCount}개 소재 일괄 등록` : '이미지를 추가하세요'}
                </>
              )}
            </button>
            {!isConfigValid && queue.length > 0 && (
              <p className="text-xs text-center text-amber-600">고정 설정의 필수 항목 (캠페인, 광고세트, 페이지, 주요 텍스트, URL)을 먼저 입력하세요.</p>
            )}
          </div>
        );
      };

      // ─── Meta Creative Settings Panel ───
      const MetaCreativeSettingsPanel = ({ campaigns }) => {
        const [tab, setTab] = useState('single');
        return (
          <div className="space-y-6">
            <div>
              <div className="flex items-center gap-2 mb-1">
                <h2 className="text-2xl font-bold text-ppl-text">Creative Upload</h2>
                <span className="px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-600">Meta 전용</span>
              </div>
              <p className="text-sm text-ppl-sub">새 소재 등록</p>
            </div>
            <div className="flex gap-1 bg-ppl-bg rounded-xl p-1 w-fit">
              {[['single', '단건 등록'], ['bulk', '대량 등록']].map(([id, label]) => (
                <button key={id} onClick={() => setTab(id)}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition-colors ${tab === id ? 'bg-white text-ppl-text shadow-sm' : 'text-ppl-sub hover:text-ppl-text'}`}>
                  {label}
                </button>
              ))}
            </div>
            {tab === 'single' ? (
              <MetaDirectUploadForm setMetaTab={() => {}} campaigns={campaigns} />
            ) : (
              <MetaBulkUploadForm campaigns={campaigns} />
            )}
          </div>
        );
      };

      // ─── Google Direct Upload Form ───
      const GoogleDirectUploadForm = ({ campaigns }) => {
        const MODES = [
          { id: 'pmax',       label: 'PMAX',       desc: '퍼포먼스 맥스' },
          { id: 'search',     label: 'Search',     desc: '검색 광고 (RSA)' },
          { id: 'display',    label: 'Display',    desc: 'GDN 디스플레이' },
          { id: 'video',      label: 'Video',      desc: 'YouTube 동영상' },
          { id: 'demand_gen', label: 'Demand Gen', desc: 'Discover/Gmail/YouTube' },
          { id: 'shopping',   label: 'Shopping',   desc: '쇼핑 (Merchant Center)' },
        ];
        // Which modes need headlines/descriptions
        const NEEDS_HEADLINES = ['search', 'display', 'pmax'];
        const NEEDS_DESCRIPTIONS = ['search', 'display', 'pmax'];
        const NEEDS_LONG_HEADLINE = ['display', 'pmax'];
        const NEEDS_BUSINESS_NAME = ['display', 'pmax'];
        const NEEDS_IMAGES = ['display', 'pmax'];
        const NEEDS_KEYWORDS = ['search'];
        const NEEDS_VIDEO = ['video'];
        const NEEDS_MERCHANT = ['shopping'];

        const [mode, setMode] = useState('pmax');
        const [pmaxMode, setPmaxMode] = useState('new'); // 'new' | 'add' | 'winner'

        // Meta Winner → PMAX 파이프라인 상태
        const [winnerDays, setWinnerDays] = useState(7);
        const [winners, setWinners] = useState(null);
        const [winnersLoading, setWinnersLoading] = useState(false);
        const [assetGroupId, setAssetGroupId] = useState('');
        const [fieldType, setFieldType] = useState('MARKETING_IMAGE');
        const [pushingId, setPushingId] = useState(null);
        const [pushResults, setPushResults] = useState({});
        const [pipelineCampaigns, setPipelineCampaigns] = useState([]);
        const [pipelineAssetGroups, setPipelineAssetGroups] = useState([]);
        const [pipelineCampaignId, setPipelineCampaignId] = useState('');
        const [pipelineAssetGroupsLoading, setPipelineAssetGroupsLoading] = useState(false);

        // PMAX 캠페인 목록 로드 (winner 탭 진입 시)
        React.useEffect(() => {
          if (pmaxMode !== 'winner') return;
          apiFetch(`${API}/google/pmax-campaigns`).then(r => r.json()).then(data => {
            setPipelineCampaigns(Array.isArray(data) ? data : []);
          }).catch(() => setPipelineCampaigns([]));
        }, [pmaxMode]);

        // 캠페인 선택 시 에셋 그룹 목록 로드
        React.useEffect(() => {
          if (!pipelineCampaignId) { setPipelineAssetGroups([]); setAssetGroupId(''); return; }
          setPipelineAssetGroupsLoading(true);
          apiFetch(`${API}/google/campaigns/${pipelineCampaignId}/asset-groups`).then(r => r.json()).then(data => {
            const groups = Array.isArray(data) ? data : [];
            setPipelineAssetGroups(groups);
            setAssetGroupId(groups.length > 0 ? String(groups[0].id) : '');
          }).catch(() => setPipelineAssetGroups([])).finally(() => setPipelineAssetGroupsLoading(false));
        }, [pipelineCampaignId]);

        const checkWinners = async () => {
          setWinnersLoading(true); setWinners(null);
          try {
            const data = await apiFetch(`${API}/creative-library/meta-winners?days=${winnerDays}`).then(r => r.json());
            setWinners(data);
          } catch (e) { setWinners({ error: e.message }); }
          finally { setWinnersLoading(false); }
        };

        const pushToGoogle = async (libraryId) => {
          if (!assetGroupId.trim()) { alert('에셋 그룹을 선택하세요'); return; }
          setPushingId(libraryId);
          try {
            const data = await apiFetch(`${API}/creative-library/${libraryId}/push-to-google`, {
              method: 'POST',
              body: JSON.stringify({ assetGroupId: assetGroupId.trim(), fieldType }),
            }).then(r => r.json());
            setPushResults(prev => ({ ...prev, [libraryId]: { ok: data.success, msg: data.success ? 'Google PMAX 업로드 완료' : (data.error || '실패') } }));
            if (data.success) setWinners(prev => ({ ...prev, winners: prev.winners.map(w => w.library_id === libraryId ? { ...w, google_pushed: true } : w) }));
          } catch (e) {
            setPushResults(prev => ({ ...prev, [libraryId]: { ok: false, msg: e.message } }));
          } finally { setPushingId(null); }
        };
        const [df, setDf] = useState({
          name: '', dailyBudget: '1', campaignId: '', adGroupName: '',
          keywords: '', finalUrl: '', adStatus: 'PAUSED',
          businessName: '', longHeadline: '',
          youtubeVideoId: '', videoHeadline: '', videoDescription: '',
          merchantId: '', callToActionText: '',
        });
        const [headlines, setHeadlines] = useState(['', '', '']);
        const [descriptions, setDescriptions] = useState(['', '']);
        const [images, setImages] = useState({ logo: null, marketing: null, square: null });

        // ── Demand Gen specific state ──
        const [dgAdType, setDgAdType] = useState('image'); // 'image' | 'video'
        const [dgBiddingGoal, setDgBiddingGoal] = useState('CONVERSIONS');
        const [dgTargetCpa, setDgTargetCpa] = useState('');
        const [dgUseCpa, setDgUseCpa] = useState(false);
        const [dgProductFeed, setDgProductFeed] = useState(false);
        const [dgStartDate, setDgStartDate] = useState('');
        const [dgEndDate, setDgEndDate] = useState('');
        const [dgHeadlines, setDgHeadlines] = useState(['']);
        const [dgLongHeadlines, setDgLongHeadlines] = useState(['']);
        const [dgDescriptions, setDgDescriptions] = useState(['']);
        const [dgAdName, setDgAdName] = useState('');
        const [dgMarketingImages, setDgMarketingImages] = useState([]);   // [{base64, name}]
        const [dgSquareImages, setDgSquareImages] = useState([]);
        const [dgLogos, setDgLogos] = useState([]);
        const [dgYoutubeIds, setDgYoutubeIds] = useState(['']);
        const [dgUseCpc, setDgUseCpc] = useState(false);
        const [dgTargetCpc, setDgTargetCpc] = useState('');
        // Conversion goals: single select for CONVERSIONS, multi select for CONVERSION_VALUE
        const [dgConversionGoal, setDgConversionGoal] = useState('signup'); // for CONVERSIONS (radio)
        const [dgConversionGoals, setDgConversionGoals] = useState(['signup', 'purchase']); // for CONVERSION_VALUE (checkbox)
        const DG_CONVERSION_GOALS = [
          { id: 'signup', label: '가입', icon: '☑', source: '웹사이트', actions: '액션 1개', value: '동적' },
          { id: 'purchase', label: '구매', icon: '🏷', source: '웹사이트', actions: '액션 3개', value: '동적' },
          { id: 'add_to_cart', label: '장바구니에 추가', icon: '🛒', source: '웹사이트', actions: '액션 1개', value: '동적' },
          { id: 'engagement', label: '참여', icon: '✨', source: '웹사이트', actions: '액션 1개', value: '동적' },
          { id: 'directions', label: '길찾기', icon: '📍', source: '웹사이트', actions: '액션 1개', value: '동적' },
        ];
        const DG_CTA_OPTIONS = [
          { value: '', label: '(자동)' },
          { value: '사이트 방문', label: '사이트 방문' },
          { value: '구매', label: '구매' },
          { value: '가입', label: '가입' },
          { value: '문의', label: '문의' },
          { value: '다운로드', label: '다운로드' },
          { value: '자세히 알아보기', label: '자세히 알아보기' },
          { value: '예약', label: '예약' },
        ];
        const [dStatus, setDStatus] = useState(null);
        const [dError, setDError] = useState('');
        const [dResult, setDResult] = useState(null);

        const set = (k, v) => setDf(prev => ({ ...prev, [k]: v }));

        // Adjust headline/description counts per mode
        useEffect(() => {
          const MIN_H = { search: 3, display: 1, pmax: 5 };
          const MIN_D = { search: 2, display: 1, pmax: 4 };
          const minH = MIN_H[mode] || 1;
          const minD = MIN_D[mode] || 1;
          setHeadlines(h => {
            if (mode === 'demand_gen') return h; // demand_gen uses its own state
            return h.length >= minH ? h : [...h, ...Array(minH - h.length).fill('')];
          });
          setDescriptions(d => {
            if (!NEEDS_DESCRIPTIONS.includes(mode)) return [''];
            return d.length >= minD ? d : [...d, ...Array(minD - d.length).fill('')];
          });
        }, [mode]);

        const handleImageFile = (key, file) => {
          if (!file || !file.type.startsWith('image/')) return;
          const reader = new FileReader();
          reader.onload = () => {
            const base64 = reader.result.split(',')[1];
            setImages(prev => ({ ...prev, [key]: { base64, name: file.name } }));
          };
          reader.readAsDataURL(file);
        };

        const handleSubmit = async () => {
          setDStatus('loading'); setDError(''); setDResult(null);
          try {
            let body;

            if (mode === 'demand_gen') {
              // Demand Gen: dedicated body
              body = {
                mode: 'demand_gen', name: df.name, dailyBudget: df.dailyBudget, finalUrl: df.finalUrl,
                adType: dgAdType, adName: dgAdName || undefined,
                businessName: df.businessName, biddingGoal: dgBiddingGoal,
                headlines: dgHeadlines.filter(h => h.trim()),
                descriptions: dgDescriptions.filter(d => d.trim()),
                callToActionText: df.callToActionText || undefined,
                ...(dgUseCpa && dgTargetCpa && { targetCpa: dgTargetCpa }),
                ...(dgProductFeed && df.merchantId && { merchantId: df.merchantId }),
                ...(dgStartDate && { startDate: dgStartDate }),
                ...(dgEndDate && { endDate: dgEndDate }),
                ...(dgLogos.length && { logoBase64: dgLogos[0].base64 }),
              };
              if (dgAdType === 'image') {
                if (dgMarketingImages.length) body.marketingImagesBase64 = dgMarketingImages.map(i => i.base64);
                if (dgSquareImages.length) body.squareImagesBase64 = dgSquareImages.map(i => i.base64);
