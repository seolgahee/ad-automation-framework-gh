                            return (
                              <tr key={row.campaignId || i} className="border-b border-ppl-border/50 hover:bg-ppl-bg/60 transition-colors">
                                <td className="py-2.5 px-3 text-[11px] text-ppl-text font-medium leading-snug">{row.campaignName}</td>
                                <td className="py-2.5 px-3 text-xs text-right text-ppl-sub">{row.impressions.toLocaleString()}</td>
                                <td className="py-2.5 px-3 text-xs text-right text-ppl-sub">{row.clicks.toLocaleString()}</td>
                                <td className="py-2.5 px-3 text-xs text-right text-ppl-sub">{row.ctr.toFixed(2)}%</td>
                                <td className="py-2.5 px-3 text-xs text-right text-blue-600 font-medium">₩{krwFmt.format(Math.round(row.spend))}</td>
                                <td className="py-2.5 px-3 text-xs text-right text-ppl-sub">₩{krwFmt.format(Math.round(row.cpc))}</td>
                                <td className="py-2.5 px-3 text-xs text-right text-ppl-sub">{row.conversions.toLocaleString()}</td>
                                <td className={`py-2.5 px-3 text-xs text-right ${roasCls}`}>{row.roas.toFixed(2)}</td>
                                <td className="py-2.5 px-3 text-xs text-right text-ppl-sub">{row.cpa > 0 ? `₩${krwFmt.format(Math.round(row.cpa))}` : '-'}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot>
                          {(() => {
                            const t = campaignDailyData.reduce((a, r) => ({
                              impressions: a.impressions + r.impressions,
                              clicks:      a.clicks      + r.clicks,
                              spend:       a.spend       + r.spend,
                              conversions: a.conversions + r.conversions,
                              value:       a.value       + r.conversionValue,
                            }), { impressions: 0, clicks: 0, spend: 0, conversions: 0, value: 0 });
                            const tCtr  = t.impressions > 0 ? (t.clicks / t.impressions) * 100 : 0;
                            const tCpc  = t.clicks > 0 ? t.spend / t.clicks : 0;
                            const tRoas = t.spend > 0 ? t.value / t.spend : 0;
                            const tCpa  = t.conversions > 0 ? t.spend / t.conversions : 0;
                            const roasCls = tRoas >= 2 ? 'text-emerald-600 font-bold' : tRoas >= 1.5 ? 'text-teal-600 font-bold' : tRoas > 0 ? 'text-amber-600 font-bold' : 'text-red-500 font-bold';
                            return (
                              <tr className="border-t-2 border-ppl-border bg-ppl-bg">
                                <td className="py-2.5 px-3 text-xs font-bold text-ppl-text">합계 ({campaignDailyData.length}개 캠페인)</td>
                                <td className="py-2.5 px-3 text-xs text-right font-bold text-ppl-text">{t.impressions.toLocaleString()}</td>
                                <td className="py-2.5 px-3 text-xs text-right font-bold text-ppl-text">{t.clicks.toLocaleString()}</td>
                                <td className="py-2.5 px-3 text-xs text-right font-bold text-ppl-text">{tCtr.toFixed(2)}%</td>
                                <td className="py-2.5 px-3 text-xs text-right font-bold text-blue-700">₩{krwFmt.format(Math.round(t.spend))}</td>
                                <td className="py-2.5 px-3 text-xs text-right font-bold text-ppl-text">₩{krwFmt.format(Math.round(tCpc))}</td>
                                <td className="py-2.5 px-3 text-xs text-right font-bold text-ppl-text">{t.conversions.toLocaleString()}</td>
                                <td className={`py-2.5 px-3 text-xs text-right ${roasCls}`}>{tRoas.toFixed(2)}</td>
                                <td className="py-2.5 px-3 text-xs text-right font-bold text-ppl-text">{tCpa > 0 ? `₩${krwFmt.format(Math.round(tCpa))}` : '-'}</td>
                              </tr>
                            );
                          })()}
                        </tfoot>
                      </table>
                    </div>
                  )}
                </div>
              )}

              {/* AI 인사이트 카드 (Meta 전용) */}
              {selectedPlatform === 'meta' && (
                <div>
                  <div className="flex items-center gap-2 mb-3">
                    <svg width="14" height="14" fill="none" stroke="#14B8A6" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="M12 8v4l3 3"/></svg>
                    <p className="text-sm font-semibold text-ppl-text">AI 소재 인사이트</p>
                    <span className="text-[10px] text-ppl-sub">최근 7일 기준</span>
                    {insightsLoading && <span className="text-[10px] text-ppl-teal ml-1">분석 중...</span>}
                  </div>
                  {insightsLoading && !creativeInsights ? (
                    <div className="grid grid-cols-2 gap-3">
                      {[...Array(4)].map((_, i) => (
                        <div key={i} className="bg-white rounded-xl border border-ppl-border p-4 animate-pulse">
                          <div className="h-3 bg-gray-100 rounded w-1/2 mb-3"></div>
                          <div className="space-y-2">
                            {[...Array(3)].map((_, j) => <div key={j} className="h-2.5 bg-gray-100 rounded w-full"></div>)}
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : creativeInsights && (
                    <div className="grid grid-cols-2 gap-3">
                      {[
                        {
                          key: 'surge', icon: '🚀', title: '노출·클릭 급증 소재',
                          color: 'border-blue-100 bg-blue-50/40',
                          badge: 'bg-blue-100 text-blue-700',
                          metric: r => `↑${r.growthRate >= 99 ? '신규' : `${r.growthRate.toFixed(1)}x`} · ${(r.impressions/1000).toFixed(1)}K 노출`,
                        },
                        {
                          key: 'highPerf', icon: '⭐', title: '고성과 소재',
                          color: 'border-emerald-100 bg-emerald-50/40',
                          badge: 'bg-emerald-100 text-emerald-700',
                          metric: r => `ROAS ${r.roas.toFixed(2)} · 전환 ${r.conversions}건`,
                        },
                        {
                          key: 'waste', icon: '⚠️', title: '전환 없는 낭비 소재',
                          color: 'border-red-100 bg-red-50/40',
                          badge: 'bg-red-100 text-red-600',
                          metric: r => `₩${krwFmt.format(Math.round(r.spend))} 소진 · 전환 0`,
                        },
                        {
                          key: 'highCpa', icon: '💸', title: '고CPA 소재',
                          color: 'border-amber-100 bg-amber-50/40',
                          badge: 'bg-amber-100 text-amber-700',
                          metric: r => `CPA ₩${krwFmt.format(Math.round(r.cpa))} · ${r.conversions}건`,
                        },
                      ].map(card => {
                        const items = creativeInsights[card.key] || [];
                        return (
                          <div key={card.key} className={`rounded-xl border p-4 ${card.color}`}>
                            <div className="flex items-center gap-1.5 mb-3">
                              <span className="text-sm">{card.icon}</span>
                              <p className="text-xs font-semibold text-ppl-text">{card.title}</p>
                            </div>
                            {items.length === 0 ? (
                              <p className="text-[11px] text-ppl-sub py-2">해당 소재 없음</p>
                            ) : (
                              <div className="space-y-2.5">
                                {items.map((r, i) => (
                                  <div key={r.adId || i} className="flex flex-col gap-0.5">
                                    <div className="flex items-start gap-1.5">
                                      <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full shrink-0 mt-0.5 ${card.badge}`}>{i + 1}</span>
                                      <p className="text-[11px] font-medium text-ppl-text leading-snug">{r.adName}</p>
                                    </div>
                                    <p className="text-[10px] text-ppl-sub pl-5">{card.metric(r)}</p>
                                    {r.comment && (
                                      <p className="text-[10px] text-ppl-teal pl-5 italic">"{r.comment}"</p>
                                    )}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </div>
      );

      // ─── Dashboard Panel (inline in chat, Perplexity style) ─
      const DashboardPanel = () => (
        <div className="space-y-6">
          {/* Subagent execution steps */}
          <div className="border-b border-ppl-border pb-4">
            <p className="text-xs font-medium text-ppl-sub uppercase tracking-wider mb-3">Running Subagents</p>
            <SubagentStep icon={Icons.globe} text="Fetching Meta campaign insights and today's spend data" model="Meta API" status="done" delay={0} />
            <SubagentStep icon={Icons.globe} text="Fetching Google Ads performance metrics via GAQL" model="Google API" status="done" delay={100} />
            <SubagentStep icon={Icons.gear} text="Normalizing cross-platform data and computing KPIs" model="Optimizer" status="done" delay={200} />
            <SubagentStep icon={Icons.code} text="Analyzing ROAS trends and budget burn rates" model="Optimizer" status="done" delay={300} />
            <SubagentStep icon={Icons.chart} text="Building real-time performance dashboard" model="Collector" status="done" delay={400} />
          </div>

          {/* Content Studio */}
          <ContentStudioPanel />

          {/* File outputs (Perplexity attachment style) */}
          <div className="flex gap-3 flex-wrap">
            <FileCard name="performance_report.xlsx" size="Weekly export" icon={Icons.chart} />
            <FileCard name="budget_optimization.json" size="Reallocation plan" icon={Icons.gear} />
          </div>

          {/* Scheduled tasks (Perplexity style) */}
          <div className="bg-white rounded-2xl border border-ppl-border px-5 py-4 shadow-sm inline-block">
            <div className="flex items-center gap-2 text-ppl-sub mb-1">
              {Icons.clock}
              <span className="text-sm font-medium">Scheduled tasks</span>
            </div>
            <p className="text-sm text-ppl-sub ml-6">Data collection every 15 minutes</p>
            <p className="text-sm text-ppl-sub ml-6">Alert check on each collection cycle</p>
          </div>
        </div>
      );

      // ─── Chat Popup ─────────────────────────────────
      const ChatPopup = () => {
        const [open, setOpen] = React.useState(false);
        const [history, setHistory] = React.useState([]);
        const [input, setInput] = React.useState('');
        const [loading, setLoading] = React.useState(false);
        const bottomRef = React.useRef(null);

        React.useEffect(() => {
          if (open) bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [history, open]);

        const send = async (text) => {
          const msg = (text || input).trim();
          if (!msg || loading) return;
          setInput('');
          setHistory(prev => [...prev, { role: 'user', text: msg }]);
          setLoading(true);
          try {
            const res = await apiFetch(`${API}/chat`, { method: 'POST', body: JSON.stringify({ message: msg }) });
            const data = await res.json();
            setHistory(prev => [...prev, { role: 'agent', text: data.reply || data.error || '응답 없음' }]);
          } catch {
            setHistory(prev => [...prev, { role: 'agent', text: '서버 연결 오류. 다시 시도해주세요.' }]);
          } finally {
            setLoading(false);
          }
        };


        return (
          <>
            {/* Floating Button */}
            <button
              onClick={() => setOpen(o => !o)}
              className="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-ppl-teal text-white shadow-lg hover:bg-teal-600 transition-all flex items-center justify-center"
              title="AI 광고 어시스턴트"
            >
              {open
                ? <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                : <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              }
            </button>

            {/* Popup */}
            {open && (
              <div className="fixed bottom-24 right-6 z-50 bg-white rounded-2xl shadow-2xl border border-ppl-border flex flex-col overflow-hidden animate-in" style={{width: '480px', height: '600px'}}>
                {/* Header */}
                <div className="px-4 py-3 bg-ppl-teal flex items-center gap-2 shrink-0">
                  <svg width="16" height="16" fill="none" stroke="white" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  <span className="text-white text-sm font-semibold flex-1">AI 광고 어시스턴트</span>
                  <button onClick={() => setOpen(false)} className="text-white/70 hover:text-white transition-colors">
                    <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>

                {/* Messages */}
                <div className="flex-1 overflow-y-auto scrollbar-thin px-4 py-3 space-y-3">
                  {history.length === 0 && (
                    <div className="text-center pt-6">
                      <p className="text-xs text-ppl-sub">무엇이든 물어보세요</p>
                    </div>
                  )}
                  {history.map((m, i) => (
                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] rounded-2xl px-3 py-2 text-xs leading-relaxed whitespace-pre-wrap ${
                        m.role === 'user'
                          ? 'bg-ppl-teal text-white rounded-br-sm'
                          : 'bg-ppl-bg text-ppl-text border border-ppl-border rounded-bl-sm'
                      }`}>
                        {m.text}
                      </div>
                    </div>
                  ))}
                  {loading && (
                    <div className="flex justify-start">
                      <div className="bg-ppl-bg border border-ppl-border rounded-2xl rounded-bl-sm px-3 py-2 flex gap-1">
                        {[0,1,2].map(i => <span key={i} className="w-1.5 h-1.5 rounded-full bg-ppl-sub pulse-dot" style={{animationDelay:`${i*0.2}s`}}/>)}
                      </div>
                    </div>
                  )}
                  <div ref={bottomRef} />
                </div>

                {/* Input */}
                <div className="shrink-0 border-t border-ppl-border px-3 py-2">
                  <div className="flex items-center gap-2 bg-ppl-bg rounded-xl px-3 py-2 border border-ppl-border focus-within:border-ppl-teal transition-colors">
                    <input
                      type="text"
                      value={input}
                      onChange={e => setInput(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && send()}
                      placeholder="메시지 입력..."
                      className="flex-1 bg-transparent text-xs placeholder:text-gray-400 focus:outline-none"
                    />
                    <button onClick={() => send()}
                      disabled={!input.trim() || loading}
                      className={`p-1.5 rounded-lg transition-colors ${input.trim() && !loading ? 'bg-ppl-teal text-white hover:bg-teal-600' : 'bg-gray-100 text-gray-300'}`}>
                      <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                  </div>
                </div>
              </div>
            )}
          </>
        );
      };

      // ─── Main Render ────────────────────────────────
      return (
        <>
        <div className="h-screen flex bg-ppl-bg">
          <Sidebar />

          {/* Main Content Area */}
          <div className="flex-1 flex flex-col min-w-0">
            {/* Top Bar */}
            <div className="h-14 border-b border-ppl-border bg-white flex items-center px-4 gap-3 shrink-0">
              <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-1.5 rounded-lg hover:bg-ppl-hover text-ppl-sub transition-colors">
                {Icons.sidebar}
              </button>

              {/* Platform Selector */}
              <div className="flex items-center gap-1 bg-ppl-bg rounded-xl p-1 border border-ppl-border">
                {[
                  { id: 'meta', label: 'Meta' },
                  { id: 'google', label: 'Google' },
                ].map(p => (
                  <button
                    key={p.id}
                    onClick={() => setSelectedPlatform(p.id)}
                    className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-colors ${
                      selectedPlatform === p.id
                        ? p.id === 'meta' ? 'bg-blue-500 text-white'
                          : p.id === 'google' ? 'bg-amber-500 text-white'
                          : 'bg-ppl-teal text-white'
                        : 'text-ppl-sub hover:text-ppl-text'
                    }`}
                  >
                    {p.label}
                  </button>
                ))}
              </div>

              <div className="flex-1" />
              <div className="flex items-center gap-2">
                <span className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-500' : 'bg-red-400'}`}></span>
                <span className="text-xs text-ppl-sub">{connected ? 'Live' : 'Disconnected'}</span>
              </div>
              <span className="text-xs text-ppl-sub border border-ppl-border rounded-lg px-2.5 py-1">Ad Automation v1.0</span>
            </div>

            {/* Chat / Content Scroll */}
            <div className="flex-1 overflow-y-auto scrollbar-thin">
              {activeView === 'meta-creative' ? (
                <div className="px-8 py-8">
                  {selectedPlatform === 'google' ? (
                    <GoogleCreativeSettingsPanel campaigns={campaigns} />
                  ) : (
                    <MetaCreativeSettingsPanel campaigns={campaigns} />
                  )}
                </div>
              ) : activeView === 'creatives' ? (
                <div className="px-8 py-8">
                  <CreativesGalleryPanel />
                </div>
              ) : activeView === 'overview' ? (
                <div className="px-8 py-8">
                  <OverviewPanel />
                </div>
              ) : activeView === 'automation' ? (
                <div className="px-8 py-8">
                  <AutomationPanel />
                </div>
              ) : activeView === 'library' ? (
                <div className="px-8 py-8">
                  <CreativeLibraryPage />
                </div>
              ) : null}
            </div>
          </div>
        </div>
        <ChatPopup />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
