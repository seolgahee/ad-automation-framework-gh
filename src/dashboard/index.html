              } else {
                body.youtubeVideoIds = dgYoutubeIds.filter(id => id.trim());
                body.longHeadlines = dgLongHeadlines.filter(h => h.trim());
              }
            } else if (mode === 'search') {
              body = {
                mode: 'search', name: df.name, dailyBudget: df.dailyBudget, finalUrl: df.finalUrl,
                headlines: headlines.filter(h => h.trim()),
                descriptions: descriptions.filter(d => d.trim()),
                keywords: df.keywords.split(',').map(k => k.trim()).filter(Boolean),
                ...(df.campaignId && { campaignId: df.campaignId }),
                ...(df.adGroupName && { adGroupName: df.adGroupName }),
              };
            } else if (mode === 'display') {
              body = {
                mode: 'display', name: df.name, dailyBudget: df.dailyBudget, finalUrl: df.finalUrl,
                headlines: headlines.filter(h => h.trim()),
                longHeadline: df.longHeadline,
                descriptions: descriptions.filter(d => d.trim()),
                businessName: df.businessName,
                ...(df.campaignId && { campaignId: df.campaignId }),
                ...(images.marketing && { marketingImageBase64: images.marketing.base64 }),
                ...(images.square && { squareImageBase64: images.square.base64 }),
                ...(images.logo && { logoBase64: images.logo.base64 }),
              };
            } else if (mode === 'pmax') {
              body = {
                mode: 'pmax', name: df.name, dailyBudget: df.dailyBudget, finalUrl: df.finalUrl,
                headlines: headlines.filter(h => h.trim()),
                longHeadline: df.longHeadline,
                descriptions: descriptions.filter(d => d.trim()),
                businessName: df.businessName,
                ...(images.logo && { logoBase64: images.logo.base64 }),
                ...(images.marketing && { marketingImageBase64: images.marketing.base64 }),
                ...(images.square && { squareImageBase64: images.square.base64 }),
              };
            } else {
              // video, shopping (generic fallback)
              body = { mode, name: df.name, dailyBudget: df.dailyBudget, finalUrl: df.finalUrl };
              if (df.campaignId) body.campaignId = df.campaignId;
              if (df.merchantId) body.merchantId = df.merchantId;
              if (df.youtubeVideoId) {
                body.youtubeVideoId = df.youtubeVideoId;
                body.headline = df.videoHeadline;
                body.description = df.videoDescription;
              }
            }

            const res = await apiFetch(`${API}/google/creative/direct`, {
              method: 'POST', body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '등록 실패');
            setDResult(data); setDStatus('success');
          } catch (e) { setDError(e.message); setDStatus('error'); }
        };

        const minHeadlines = mode === 'pmax' ? 5 : 3;
        const minDescriptions = mode === 'pmax' ? 4 : 2;
        const validHeadlines = !NEEDS_HEADLINES.includes(mode) || headlines.filter(h => h.trim()).length >= minHeadlines;
        const validDescriptions = !NEEDS_DESCRIPTIONS.includes(mode) || descriptions.filter(d => d.trim()).length >= minDescriptions;

        // Demand Gen has its own validation
        const dgValid = mode === 'demand_gen' ? (
          df.name && df.finalUrl && df.businessName
          && dgHeadlines.filter(h => h.trim()).length >= 1
          && dgDescriptions.filter(d => d.trim()).length >= 1
          && (dgAdType === 'video' ? dgYoutubeIds.filter(id => id.trim()).length >= 1 && dgLongHeadlines.filter(h => h.trim()).length >= 1 : true)
        ) : true;

        let isValid = false;
        if (mode === 'demand_gen') {
          isValid = dgValid;
        } else if (mode === 'search') {
          isValid = df.name && df.finalUrl && headlines.filter(h => h.trim()).length >= 3 && descriptions.filter(d => d.trim()).length >= 2;
        } else if (mode === 'display') {
          isValid = df.name && df.finalUrl && df.businessName && df.longHeadline && headlines.filter(h => h.trim()).length >= 1 && descriptions.filter(d => d.trim()).length >= 1;
        } else if (mode === 'pmax') {
          isValid = df.name && df.finalUrl && df.businessName && df.longHeadline && headlines.filter(h => h.trim()).length >= 5 && descriptions.filter(d => d.trim()).length >= 4;
        } else {
          // video, shopping (generic fallback)
          isValid = df.name && df.finalUrl
            && (!NEEDS_VIDEO.includes(mode) || df.youtubeVideoId)
            && (!NEEDS_MERCHANT.includes(mode) || df.merchantId);
        }

        const ImageDropZone = ({ label, size, imgKey }) => (
          <div className="flex-1">
            <label className="block text-xs font-medium text-ppl-text mb-1.5">{label} ({size})</label>
            {images[imgKey] ? (
              <div className="flex items-center gap-2 p-3 bg-emerald-50 border border-emerald-200 rounded-xl">
                <span className="text-xs text-emerald-700 truncate flex-1">{images[imgKey].name}</span>
                <button onClick={() => setImages(prev => ({ ...prev, [imgKey]: null }))}
                  className="text-emerald-400 hover:text-red-500 text-lg leading-none">×</button>
              </div>
            ) : (
              <div
                onDragOver={e => e.preventDefault()}
                onDrop={e => { e.preventDefault(); handleImageFile(imgKey, e.dataTransfer.files[0]); }}
                onClick={() => { const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>handleImageFile(imgKey,e.target.files[0]); inp.click(); }}
                className="flex flex-col items-center justify-center h-24 rounded-xl border-2 border-dashed border-ppl-border bg-ppl-bg hover:bg-gray-50 hover:border-amber-300 cursor-pointer transition-all"
              >
                <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p className="text-[10px] text-ppl-sub mt-1">{size}</p>
              </div>
            )}
          </div>
        );

        let sectionNum = 1;

        return (
          <div className="max-w-2xl space-y-5">
            {/* Campaign Type Selector */}
            <div className="flex flex-wrap gap-1 bg-ppl-bg rounded-xl p-1 border border-ppl-border">
              {MODES.map(m => (
                <button key={m.id} onClick={() => setMode(m.id)}
                  className={`px-3 py-2 rounded-lg text-xs font-medium transition-colors ${mode === m.id ? 'bg-amber-500 text-white shadow-sm' : 'text-ppl-sub hover:text-ppl-text'}`}
                  title={m.desc}>{m.label}</button>
              ))}
            </div>
            <p className="text-xs text-ppl-sub -mt-3 ml-1">{MODES.find(m => m.id === mode)?.desc}</p>

            {/* ══ DEMAND GEN DEDICATED FORM ══ */}
            {mode === 'demand_gen' && (<>
              {/* DG Section 1: 캠페인 설정 */}
              <div className="bg-white rounded-2xl border border-ppl-border shadow-sm p-6 space-y-4">
                <p className="text-sm font-semibold text-ppl-text flex items-center gap-2">
                  <span className="w-5 h-5 rounded-full bg-indigo-500 text-white text-[10px] font-bold flex items-center justify-center">1</span>
                  캠페인 설정
                </p>
                <div>
                  <label className="block text-xs font-medium text-ppl-text mb-1.5">캠페인 이름 *</label>
                  <input type="text" maxLength={256} placeholder="디맨드젠 캠페인"
                    value={df.name} onChange={e => set('name', e.target.value)}
                    className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
                  <span className="text-[10px] text-ppl-sub">{df.name.length}/256</span>
                </div>

                {/* 제품 피드 */}
                <div className="border border-ppl-border rounded-xl p-4 space-y-3">
                  <div className="flex items-center justify-between">
                    <span className="text-xs font-medium text-ppl-text">제품 피드</span>
                    <button onClick={() => setDgProductFeed(!dgProductFeed)}
                      className={`w-10 h-5 rounded-full transition-colors relative ${dgProductFeed ? 'bg-indigo-500' : 'bg-gray-300'}`}>
                      <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform ${dgProductFeed ? 'left-5' : 'left-0.5'}`} />
                    </button>
                  </div>
                  {dgProductFeed && (
                    <div>
                      <label className="block text-xs font-medium text-ppl-text mb-1.5">Merchant Center ID</label>
                      <input type="text" placeholder="예: 333560697"
                        value={df.merchantId} onChange={e => set('merchantId', e.target.value)}
                        className="w-full text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
                    </div>
                  )}
                </div>

                {/* 캠페인 목표 */}
                <div>
                  <label className="block text-xs font-medium text-ppl-text mb-2">캠페인 목표 *</label>
                  <div className="grid grid-cols-3 gap-2">
                    {[
                      { id: 'CONVERSIONS', label: '전환', desc: '전환 기반 입찰 전략' },
                      { id: 'CLICKS', label: '클릭수', desc: '클릭당비용 기반 입찰' },
                      { id: 'CONVERSION_VALUE', label: '전환 가치', desc: '전환 가치 최대화' },
                    ].map(g => (
                      <button key={g.id} onClick={() => setDgBiddingGoal(g.id)}
                        className={`p-3 rounded-xl border-2 text-left transition-all ${dgBiddingGoal === g.id
                          ? 'border-indigo-500 bg-indigo-50' : 'border-ppl-border hover:border-indigo-300'}`}>
                        <p className="text-xs font-semibold text-ppl-text">{g.label}</p>
                        <p className="text-[10px] text-ppl-sub mt-1">{g.desc}</p>
                      </button>
                    ))}
                  </div>
                </div>

                {/* 전환 목표 (전환 선택 시 — 라디오, 단일 선택) */}
                {dgBiddingGoal === 'CONVERSIONS' && (
                  <div className="border border-ppl-border rounded-xl p-4 space-y-3">
                    <p className="text-xs font-semibold text-ppl-text">전환 목표</p>
                    <div className="text-[10px] text-ppl-sub grid grid-cols-4 gap-2 pb-1 border-b border-ppl-border">
                      <span>전환 목표</span><span>전환 소스</span><span>전환 액션</span><span>값</span>
                    </div>
                    {DG_CONVERSION_GOALS.map(g => (
                      <label key={g.id} className={`grid grid-cols-4 gap-2 items-center p-3 rounded-lg border cursor-pointer transition-all ${
                        dgConversionGoal === g.id ? 'border-indigo-400 bg-indigo-50' : 'border-ppl-border hover:border-indigo-200'}`}>
                        <span className="flex items-center gap-2">
                          <input type="radio" name="dgConvGoal" checked={dgConversionGoal === g.id}
                            onChange={() => setDgConversionGoal(g.id)} />
                          <span className="text-xs">{g.icon} {g.label}</span>
                        </span>
                        <span className="text-xs text-ppl-sub">{g.source}</span>
                        <span className="text-xs text-ppl-sub">{g.actions}</span>
                        <span className="text-xs text-ppl-sub">{g.value}</span>
                      </label>
                    ))}
                  </div>
                )}

                {/* 타겟 전환당비용 (전환 선택 시) */}
                {dgBiddingGoal === 'CONVERSIONS' && (
                  <div className="border border-ppl-border rounded-xl p-4 space-y-3">
                    <label className="flex items-center gap-2 text-xs font-medium text-ppl-text cursor-pointer">
                      <input type="checkbox" checked={dgUseCpa} onChange={e => setDgUseCpa(e.target.checked)}
                        className="rounded border-gray-300" />
                      타겟 전환당비용 설정 (선택사항)
                    </label>
                    {dgUseCpa && (
                      <div>
                        <input type="number" min="1" placeholder="₩ 타겟 CPA"
                          value={dgTargetCpa} onChange={e => setDgTargetCpa(e.target.value)}
                          className="w-48 text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
                      </div>
                    )}
                  </div>
                )}

                {/* 타겟 클릭당 비용 (클릭수 선택 시) */}
                {dgBiddingGoal === 'CLICKS' && (
                  <div className="border border-ppl-border rounded-xl p-4 space-y-3">
                    <label className="flex items-center gap-2 text-xs font-medium text-ppl-text cursor-pointer">
                      <input type="checkbox" checked={dgUseCpc} onChange={e => setDgUseCpc(e.target.checked)}
                        className="rounded border-gray-300" />
                      타겟 클릭당 비용 설정 (선택사항)
                    </label>
                    {dgUseCpc && (
                      <div>
                        <input type="number" min="1" placeholder="₩ 타겟 CPC"
                          value={dgTargetCpc} onChange={e => setDgTargetCpc(e.target.value)}
                          className="w-48 text-sm border border-ppl-border rounded-lg px-3 py-2 bg-white" />
                      </div>
                    )}

        const FIELD_KEY_MAP = { marketing: 'MARKETING_IMAGE', square: 'SQUARE_MARKETING_IMAGE', portrait: 'PORTRAIT_MARKETING_IMAGE', logo: 'LOGO' };

          apiFetch(`${API}/google/pmax-campaigns`).then(r => r.json())

        const loadMetaAdList = () => {
          apiFetch(`${API}/meta/ad-list`)
            .then(r => r.json())
            .then(data => {

              list.sort((a, b) => (b.ad_name || '').localeCompare(a.ad_name || ''));

        };

        React.useEffect(() => {
          loadLibrary();
          loadMetaAdList();
          const ws = new WebSocket(WS_URL);
          ws.onmessage = (e) => {
            try {
              const msg = JSON.parse(e.data);
              if (msg.type === 'pda_analyzed') {
                setLibrary(prev => prev.map(i => i.id === msg.data.id
                  ? { ...i, persona: msg.data.persona, desire: msg.data.desire, awareness: msg.data.awareness }

          };
          return () => ws.close();
        }, []);

        const saveAdMapping = async (libId, adId) => {
          await apiFetch(`${API}/creative-library/${libId}/ad-mapping`, {
            method: 'PATCH', body: JSON.stringify({ ad_id: adId || null }),
          });
          setLibrary(prev => prev.map(i => i.id === libId ? { ...i, ad_id: adId || null } : i));
          setMappingLibId(null);
        };

        const uploadToLibrary = async (files) => {
          if (!files?.length) return;
          setLibUploading(true);
          const formData = new FormData();
          Array.from(files).forEach(f => formData.append('images', f));
          try {
            const res = await fetch(`${API}/creative-library/upload`, {
              method: 'POST',
              ...(API_TOKEN ? { headers: { Authorization: `Bearer ${API_TOKEN}` } } : {}),
              body: formData,
            });
            const data = await res.json();
            if (data.success) loadLibrary();
          } catch (e) { console.warn('Library upload failed', e); }
          finally { setLibUploading(false); }
        };

        const deleteFromLibrary = async (id) => {
          if (!confirm('이 소재를 라이브러리에서 삭제할까요?')) return;
          await apiFetch(`${API}/creative-library/${id}`, { method: 'DELETE' });

          setLibSelected(prev => { const n = { ...prev }; delete n[id]; return n; });
        };

        const saveLibraryName = async (id) => {
          if (!editingLibName.trim()) return;
          await apiFetch(`${API}/creative-library/${id}`, {
            method: 'PATCH', body: JSON.stringify({ name: editingLibName }),

          setLibrary(prev => prev.map(i => i.id === id ? { ...i, name: editingLibName } : i));
          setEditingLibId(null);
        };

        const toggleLibSelect = (id) => {
          setLibSelected(prev => {
            if (prev[id]) { const n = { ...prev }; delete n[id]; return n; }
            return { ...prev, [id]: 'SQUARE_MARKETING_IMAGE' };

        };

        const handleLibSubmit = async () => {
          const entries = Object.entries(libSelected);
          if (!entries.length || !selectedAssetGroupId) return;
          setLibSubmitting(true); setAddResult(null);
          setLibProgress({ done: 0, total: entries.length });

          const images = [];
          for (let i = 0; i < entries.length; i++) {
            const [id, fieldType] = entries[i];
            try {
              const res = await apiFetch(`${API}/creative-library/image/${id}?fieldType=${fieldType}`);
              const data = await res.json();
              const item = library.find(l => l.id === id);
              if (data.base64) images.push({ base64: data.base64, fieldType, name: item?.name || id });
            } catch (e) { console.warn('Library image fetch failed', id, e); }
            setLibProgress({ done: i + 1, total: entries.length });
          }

          if (!images.length) {
            setAddResult({ ok: false, msg: '이미지를 가져오는 데 실패했습니다.' });
            setLibSubmitting(false); return;

          try {
            const res = await apiFetch(`${API}/google/asset-groups/${selectedAssetGroupId}/assets`, {
              method: 'POST', body: JSON.stringify({ images }),

              setAddResult({ ok: true, msg: `소재 라이브러리에서 ${images.length}개가 PMAX 에셋그룹에 추가됐습니다.` });
              setLibSelected({});
              apiFetch(`${API}/google/asset-groups/${selectedAssetGroupId}/asset-counts`)
                .then(r => r.json()).then(setAssetCounts).catch(() => {});
            } else {
              setAddResult({ ok: false, msg: data.error || '업로드 실패' });
            }
          } catch (e) {
            setAddResult({ ok: false, msg: e.message });
          } finally { setLibSubmitting(false); }
        };

        const libSelectedCount = Object.keys(libSelected).length;

        // ── Meta 성과 소재 로드 ──
        const loadMetaCreatives = () => {
          setMetaLoading(true); setMetaCreatives([]); setSelected({});

            .catch(() => setMetaLoading(false));

        const toggleSelect = (adId) => {

            try {

            setProxyProgress({ done: i + 1, total: entries.length });

          if (images.length === 0) {
            setAddResult({ ok: false, msg: '이미지를 가져오는 데 실패했습니다. Meta 이미지 URL이 만료되었을 수 있습니다.' });
            setProxyLoading(false); return;
          }

          try {
            const res = await apiFetch(`${API}/google/asset-groups/${selectedAssetGroupId}/assets`, {
              method: 'POST', body: JSON.stringify({ images }),

              setAddResult({ ok: false, msg: data.error || '업로드 실패' });

          } catch (e) {
            setAddResult({ ok: false, msg: e.message });
          } finally { setProxyLoading(false); }

                    >

                        onChange={e => { if (e.target.files.length) uploadToLibrary(e.target.files); }} />
                      {libUploading
                        ? <div className="flex items-center gap-2 text-ppl-sub"><span className="w-4 h-4 border-2 border-emerald-400 border-t-transparent rounded-full animate-spin"></span><span className="text-sm">업로드 중...</span></div>
                        : <><svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24" className="text-ppl-sub mb-1"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p className="text-sm font-medium text-ppl-text">라이브러리에 이미지 추가</p><p className="text-xs text-ppl-sub">여러 파일 동시 선택 가능</p></>
                      }
                    </div>

                    {/* 라이브러리 그리드 */}
                    {libraryLoading && <div className="flex items-center justify-center h-24 text-ppl-sub gap-2"><span className="w-4 h-4 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span><span className="text-sm">불러오는 중...</span></div>}
                    {!libraryLoading && library.length === 0 && (
                      <div className="text-center py-8 text-ppl-sub text-sm">라이브러리가 비어있습니다. 위에서 이미지를 추가하세요.</div>

                    {library.length > 0 && (
                      <>
                        <p className="text-xs text-ppl-sub">{library.length}개 · 클릭해서 선택 · 선택 후 이미지 타입 지정</p>

                      <button onClick={loadMetaCreatives} disabled={metaLoading}

                        {metaLoading ? '조회 중...' : '조회'}
                      </button>
                    </div>

                    {/* 소재 그리드 */}
                    {metaLoading && (
                      <div className="flex items-center justify-center h-32 text-ppl-sub gap-2">
                        <span className="w-5 h-5 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></span>
                        <span className="text-sm">Meta 성과 데이터 조회 중...</span>

                    {!metaLoading && metaCreatives.length === 0 && (
                      <div className="text-center py-10 text-ppl-sub text-sm">
                        <p>조회 버튼을 눌러 Meta 성과 소재를 불러오세요.</p>
                        <p className="text-xs mt-1">성과 데이터가 없으면 서버 수집 후 다시 시도하세요.</p>
                      </div>

                    {metaCreatives.length > 0 && (
                      <>
                        <p className="text-xs text-ppl-sub">ROAS 기준 상위 {metaCreatives.length}개 · 클릭해서 선택 · 선택 후 이미지 타입 지정</p>

                              >
                                {/* 이미지 — 라이브러리 BLOB 우선, 없으면 로컬 캐시 */}
                                <div className="aspect-square bg-ppl-bg relative">
                                  {c.library_thumb ? (
                                    <img src={c.library_thumb} alt={c.ad_name} className="w-full h-full object-cover" />
                                  ) : (
                                    <img
                                      src={`${THUMB}/meta/${c.ad_id}`}
                                      alt={c.ad_name}
                                      className="w-full h-full object-cover"
                                      onError={e => { e.target.style.display = 'none'; }}

                                  {/* ROAS 배지 */}
                                  <span className={`absolute top-1.5 left-1.5 text-[10px] font-bold px-1.5 py-0.5 rounded-md ${c.roas >= 3 ? 'bg-emerald-500 text-white' : c.roas >= 1.5 ? 'bg-amber-400 text-white' : 'bg-gray-400 text-white'}`}>
                                    ROAS {c.roas.toFixed(1)}

                                  {/* 선택 체크 */}
                                  {isSelected && (

                                      <svg width="10" height="10" fill="none" stroke="white" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                                    </span>

                                {/* 정보 */}

                                  <p className="text-[11px] font-medium text-ppl-text truncate" title={c.ad_name}>{c.ad_name || c.ad_id}</p>

                    {/* 진행 상태 */}
                    {proxyLoading && (
                      <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3">
                        <div className="flex items-center gap-2 mb-2">
                          <span className="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></span>
                          <span className="text-sm font-medium text-blue-700">이미지 다운로드 및 업로드 중...</span>
                        </div>
                        <div className="w-full bg-blue-100 rounded-full h-1.5">
                          <div className="bg-blue-500 h-1.5 rounded-full transition-all"
                            style={{ width: `${proxyProgress.total > 0 ? (proxyProgress.done / proxyProgress.total) * 100 : 0}%` }}></div>
                        </div>
                        <p className="text-xs text-blue-600 mt-1">{proxyProgress.done} / {proxyProgress.total}</p>
                      </div>
                    )}

                    {addResult && (
                      <div className={`rounded-xl px-4 py-3 text-sm font-medium ${addResult.ok ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-red-50 text-red-600 border border-red-100'}`}>

                    <button onClick={handleMetaSubmit}
                      disabled={proxyLoading || selectedCount === 0 || !selectedAssetGroupId}

                      {proxyLoading
                        ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>PMAX에 추가 중...</>
                        : `선택한 소재 ${selectedCount}개 PMAX에 추가`
                      }

                  </div>
                )}

            )}

      };

      // ─── Google Creative Settings Panel ───
      const GoogleCreativeSettingsPanel = ({ campaigns }) => (
        <div className="space-y-6">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <h2 className="text-2xl font-bold text-ppl-text">Creative Upload</h2>
              <span className="px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-600">Google 전용</span>
            </div>
            <p className="text-sm text-ppl-sub">Search / Display / Video / Demand Gen / Shopping / PMAX</p>
          </div>
          <GoogleDirectUploadForm campaigns={campaigns} />

    // ═══ MAIN APP ════════════════════════════════════════════
    function App() {
      const [overview, setOverview] = useState(null);
      const [campaigns, setCampaigns] = useState([]);
      const [timeline, setTimeline] = useState([]);
      const [alerts, setAlerts] = useState([]);
      const [days, setDays] = useState(7);
      const today = new Date().toISOString().split('T')[0];
      const defaultSince = new Date(Date.now() - 6 * 86400000).toISOString().split('T')[0];
      const [dateRange, setDateRange] = useState({ since: defaultSince, until: today });
      const [connected, setConnected] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [inputValue, setInputValue] = useState('');
      const [chatHistory, setChatHistory] = useState([]);
      const [activeView, setActiveView] = useState('overview');
      const [selectedPlatform, setSelectedPlatform] = useState('meta');
      const ws = useRef(null);
      const chatEndRef = useRef(null);

      // ─── Content data state (declared before useEffect that references it) ───
      const [creatives, setCreatives] = useState([]);
      const [templates, setTemplates] = useState([]);
      const [abTests, setAbTests] = useState([]);
      const [audiences, setAudiences] = useState([]);
      const [contentTab, setContentTab] = useState('creatives');
      const [uploadForm, setUploadForm] = useState({ templateId: '', variables: {}, mediaPath: '', landingUrl: '', campaignId: '', adSetId: '', pageId: '', abGroup: '', persona_tag: '', desire_tag: '', awareness_stage: '' });
      const [uploadStatus, setUploadStatus] = useState(null);
      const [uploadError, setUploadError] = useState('');
      const [uploadResult, setUploadResult] = useState(null);

      const PDA_OPTIONS = {
        awareness: [
          { value: '문제 인식 전', label: '문제 인식 전' },
          { value: '문제 인식',    label: '문제 인식' },
          { value: '해결책 탐색',  label: '해결책 탐색' },
          { value: '제품 인지',    label: '제품 인지' },
          { value: '구매 준비',    label: '구매 준비' },
        ],
      };

      // ─── Ad Performance (Creatives Gallery) state ───
      const [adPerformance, setAdPerformance] = useState([]);
      const [adPerfSort, setAdPerfSort] = useState('spend');
      const [adPerfFilter, setAdPerfFilter] = useState('all'); // all, best, good, low
      const [adPerfPlatform, setAdPerfPlatform] = useState('all');
      const defaultAdPerfSince = new Date(Date.now() - 6 * 86400000).toISOString().split('T')[0];
      const [adPerfDateRange, setAdPerfDateRange] = useState({ since: defaultAdPerfSince, until: today });
      const [adPerfCampaignId, setAdPerfCampaignId] = useState('');
      const [adPerfAdsetId, setAdPerfAdsetId] = useState('');
      const [refreshingImageUrls, setRefreshingImageUrls] = useState(false);
      const [collecting, setCollecting] = useState(false);
      const [lastCollected, setLastCollected] = useState(null);

      const triggerCollect = async () => {
        setCollecting(true);
        try {
          await apiFetch(`${API}/collect`, { method: 'POST' });
          setLastCollected(new Date().toLocaleTimeString('ko-KR'));
          fetchData();
        } catch(e) { alert('수집 실패: ' + e.message); }
        setCollecting(false);
      };
      const [adPerfFilterOptions, setAdPerfFilterOptions] = useState({ campaigns: [], adsets: [] });

      // ─── Creative Insights state ───
      const [creativeInsights, setCreativeInsights] = useState(null);
      const [insightsLoading, setInsightsLoading] = useState(false);

      // ─── PDA Insight state ───
      const [pdaInsight, setPdaInsight] = useState(null);
      const [pdaInsightLoading, setPdaInsightLoading] = useState(false);
      const [pdaInsightCampaignId, setPdaInsightCampaignId] = useState('');

      // ─── Campaign Daily Performance state ───
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      const [campaignDailySince, setCampaignDailySince] = useState(yesterday);
      const [campaignDailyUntil, setCampaignDailyUntil] = useState(yesterday);
      const [campaignDailyData, setCampaignDailyData] = useState([]);
      const [campaignDailyLoading, setCampaignDailyLoading] = useState(false);

      const fetchContentData = useCallback(async () => {
        try {
          const [cr, tpl, ab, aud] = await Promise.all([
            apiFetch(`${API}/creatives`).then(r => r.json()).catch(() => []),
            apiFetch(`${API}/templates`).then(r => r.json()).catch(() => []),
            apiFetch(`${API}/ab-tests`).then(r => r.json()).catch(() => []),
            apiFetch(`${API}/audiences`).then(r => r.json()).catch(() => []),
          ]);
          setCreatives(Array.isArray(cr) ? cr : []);
          setTemplates(Array.isArray(tpl) ? tpl : []);
          setAbTests(Array.isArray(ab) ? ab : []);
          setAudiences(Array.isArray(aud) ? aud : []);
        } catch (err) { console.error('Content fetch failed:', err); }
      }, []);


      const fetchAdPerformance = useCallback(async () => {
        try {
          const platformParam = selectedPlatform !== 'all' ? `&platform=${selectedPlatform}` : '';
          const pParam = selectedPlatform !== 'all' ? `platform=${selectedPlatform}` : '';
          const dateParams = `since=${adPerfDateRange.since}&until=${adPerfDateRange.until}`;
          const [rows, filters] = await Promise.all([
            apiFetch(`${API}/ad-performance?${dateParams}&sort=${adPerfSort}&order=desc${platformParam}`)
              .then(r => r.json()).then(d => Array.isArray(d) ? d : []).catch(() => []),
            apiFetch(`${API}/ad-performance/filters?${pParam}`)
              .then(r => r.json()).catch(() => null),
          ]);
          setAdPerformance(rows);
          if (filters?.campaigns?.length > 0) {
            setAdPerfFilterOptions(filters);
          } else if (rows.length > 0) {
            const campaigns = [...new Map(rows.map(r => [r.campaign_id, r.campaign_name])).entries()]
              .map(([id, name]) => ({ campaign_id: id, campaign_name: name }));
            const adsets = [...new Map(rows.map(r => [r.adset_id, r.adset_name])).entries()]
              .map(([id, name]) => ({ adset_id: id, adset_name: name }));
            setAdPerfFilterOptions({ campaigns, adsets });
          }
        } catch (err) { console.error('Ad performance fetch failed:', err); }
      }, [adPerfDateRange, adPerfSort, selectedPlatform]);

      const fetchData = useCallback(async () => {
        try {
          const platformParam = selectedPlatform !== 'all' ? `&platform=${selectedPlatform}` : '';
          const isOverview = activeView === 'overview';
          const rangeParam = isOverview
            ? `&since=${dateRange.since}&until=${dateRange.until}`
            : `&days=${days}`;
          const [ov, camp, tl, al] = await Promise.all([
            apiFetch(`${API}/overview?${isOverview ? `since=${dateRange.since}&until=${dateRange.until}` : `days=${days}`}${platformParam}`).then(r => r.json()),
            apiFetch(`${API}/campaigns`).then(r => r.json()),
            apiFetch(`${API}/performance/timeline?${isOverview ? `since=${dateRange.since}&until=${dateRange.until}` : `days=${days}`}${platformParam}`).then(r => r.json()),
            apiFetch(`${API}/alerts?limit=10`).then(r => r.json()),
          ]);
          setOverview(ov);
          setCampaigns(Array.isArray(camp) ? camp : []);
          setTimeline(Array.isArray(tl) ? tl : []);
          setAlerts(al);
        } catch (err) {
          console.error('Fetch failed:', err);
        }
      }, [days, selectedPlatform, activeView, dateRange]);

      const fetchCreativeInsights = useCallback(async () => {
        if (selectedPlatform !== 'meta') return;
        setInsightsLoading(true);
        try {
          const res = await apiFetch(`${API}/insights/creative`);
          const json = await res.json();
          setCreativeInsights(json);
        } catch (e) {
          setCreativeInsights(null);
        } finally {
          setInsightsLoading(false);
        }
      }, [selectedPlatform]);

      useEffect(() => {
        if (activeView === 'overview' && selectedPlatform === 'meta') {
          fetchCreativeInsights();
        }
      }, [selectedPlatform, activeView]);

      const fetchCampaignDaily = useCallback(async (since, until) => {
        if (!since || !until || !['meta', 'google'].includes(selectedPlatform)) return;
        setCampaignDailyLoading(true);
        try {
          const res = await apiFetch(`${API}/campaign-daily?since=${since}&until=${until}&platform=${selectedPlatform}`);
          const json = await res.json();
          setCampaignDailyData(Array.isArray(json) ? json : []);
        } catch (e) {
          setCampaignDailyData([]);
        } finally {
          setCampaignDailyLoading(false);
        }
      }, [selectedPlatform]);

      useEffect(() => {
        if (activeView === 'overview' && ['meta', 'google'].includes(selectedPlatform)) {
          fetchCampaignDaily(campaignDailySince, campaignDailyUntil);
        }
      }, [campaignDailySince, campaignDailyUntil, selectedPlatform, activeView]);

      useEffect(() => {
        fetchData();
        fetchContentData();
        fetchAdPerformance();
        ws.current = new WebSocket(WS_URL);
        ws.current.onopen = () => setConnected(true);
        ws.current.onclose = () => setConnected(false);
        ws.current.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (['creative_assembled', 'creative_registered', 'pipeline_complete', 'ab_test_created', 'ab_test_evaluated', 'audience_created'].includes(msg.type)) fetchContentData();
        };
        return () => { ws.current?.close(); };
      }, [fetchData, fetchContentData, fetchAdPerformance]);

      const handleCreativeUpload = async () => {
        setUploadStatus('loading');
        setUploadError('');
        setUploadResult(null);
        try {
          const res = await apiFetch(`${API}/creatives/pipeline`, {
            method: 'POST',
            body: JSON.stringify({
              platform: 'meta',
              templateId: uploadForm.templateId,
              variables: uploadForm.variables,
              campaignId: uploadForm.campaignId,
              adSetId: uploadForm.adSetId,
              ...(uploadForm.mediaPath && { mediaPath: uploadForm.mediaPath }),
              landingUrl: uploadForm.landingUrl,
              pageId: uploadForm.pageId,
              ...(uploadForm.abGroup && { abGroup: uploadForm.abGroup }),
              ...(uploadForm.persona_tag && { persona_tag: uploadForm.persona_tag }),
              ...(uploadForm.desire_tag && { desire_tag: uploadForm.desire_tag }),
              ...(uploadForm.awareness_stage && { awareness_stage: uploadForm.awareness_stage }),
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '등록 실패');
          setUploadResult(data);
          setUploadStatus('success');
          fetchContentData();
        } catch (err) {
          setUploadError(err.message);
          setUploadStatus('error');
        }
      };

      const handleStatusChange = async (id, status) => {
        try {
          await apiFetch(`${API}/campaigns/${id}/status`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status }),
          });
          fetchData();
        } catch (err) {
          console.error('Status change failed:', err);
        }
      };

      const chartData = useMemo(() => timeline.reduce((acc, row) => {
        const existing = acc.find(d => d.date === row.date);
        if (existing) {
          existing.spend += row.spend;
          existing.conversions += row.conversions;
          existing.value += row.value || 0;
          existing.clicks = (existing.clicks || 0) + (row.clicks || 0);
          existing.impressions = (existing.impressions || 0) + (row.impressions || 0);
          existing.roas = existing.spend > 0 ? existing.value / existing.spend : 0;
          existing.cpc = existing.clicks > 0 ? existing.spend / existing.clicks : 0;
          existing.ctr = existing.impressions > 0 ? (existing.clicks / existing.impressions) * 100 : 0;
        } else {
          acc.push({
            date: row.date,
            spend: row.spend,
            conversions: row.conversions,
            value: row.value || 0,
            clicks: row.clicks || 0,
            impressions: row.impressions || 0,
            roas: row.roas || 0,
            cpc: row.cpc || 0,
            ctr: row.ctr || 0,
          });
        }
        return acc;
      }, []), [timeline]);

      const handleSend = async (directMessage) => {
        const userText = (directMessage || inputValue).trim();
        if (!userText) return;
        setChatHistory(prev => [...prev, { role: 'user', text: userText }]);
        setInputValue('');
        try {
          const res = await apiFetch(`${API}/chat`, {
            method: 'POST',
            body: JSON.stringify({ message: userText }),
          });
          const data = await res.json();
          setChatHistory(prev => [...prev, { role: 'agent', text: data.reply || data.error || '응답 없음' }]);
        } catch (e) {
          setChatHistory(prev => [...prev, { role: 'agent', text: '서버 연결 오류. 다시 시도해주세요.' }]);
        }
      };

      // ─── Sidebar ─────────────────────────────────
      const Sidebar = () => (
        <div className={`${sidebarOpen ? 'w-64' : 'w-0'} shrink-0 border-r border-ppl-border bg-white transition-all duration-300 overflow-hidden flex flex-col`}>
          <div className="p-4 border-b border-ppl-border">
            <div className="flex items-center gap-2 mb-4">
              <div className="w-7 h-7 rounded-lg bg-ppl-teal flex items-center justify-center">
                <span className="text-white text-xs font-bold">A</span>
              </div>
              <span className="font-semibold text-sm">Ad Automation</span>
            </div>
            <button className="w-full flex items-center gap-2 px-3 py-2 rounded-xl bg-ppl-bg hover:bg-gray-100 text-sm text-ppl-sub transition-colors">
              {Icons.plus}
              <span>New Thread</span>
            </button>
          </div>

          <div className="flex-1 overflow-y-auto scrollbar-thin p-3">
            <p className="text-xs font-medium text-ppl-sub uppercase tracking-wider px-2 mb-2">Menu</p>
            {[
              { icon: Icons.home, label: 'Overview', view: 'overview' },
              { icon: Icons.zap, label: 'Automation', view: 'automation' },
              { icon: Icons.layers, label: 'Creatives', view: 'creatives' },
              { icon: Icons.upload, label: 'Creative Upload', view: 'meta-creative' },
              { icon: Icons.image, label: '소재 라이브러리', view: 'library' },
            ].map((item, i) => (
              <button key={i} onClick={() => { setActiveView(item.view); if (item.view === 'meta-creative' && selectedPlatform === 'all') setSelectedPlatform('meta'); }}
                className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors flex items-center gap-2 ${activeView === item.view ? 'bg-ppl-teal text-white' : 'text-ppl-sub hover:bg-ppl-hover hover:text-ppl-text'}`}>
                {item.icon}
                <span>{item.label}</span>
              </button>
            ))}



          </div>

          <div className="p-3 border-t border-ppl-border">
            <div className="flex items-center gap-2 px-3 py-2">
              <span className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-500' : 'bg-red-400'}`}></span>
              <span className="text-xs text-ppl-sub">{connected ? 'Connected' : 'Offline'}</span>
            </div>
          </div>
        </div>
      );

      // ─── Content Studio Panel ────────────────────────
      const ContentStudioPanel = () => {
        const statusBadge = (status) => {
          const styles = {
            DRAFT: 'bg-gray-100 text-gray-600',
            UPLOADED: 'bg-blue-50 text-blue-600',
            ACTIVE: 'bg-emerald-50 text-emerald-600',
            PAUSED: 'bg-amber-50 text-amber-600',
            SETUP: 'bg-gray-100 text-gray-600',
            RUNNING: 'bg-blue-50 text-blue-600',
            COMPLETED: 'bg-emerald-50 text-emerald-600',
          };
          return <span className={`px-2 py-0.5 rounded-md text-xs font-medium ${styles[status] || 'bg-gray-100 text-gray-600'}`}>{status}</span>;

{ id: 'pmax-assets', label: 'PMAX 에셋 성과', hide: selectedPlatform === 'meta' },

                  { label: '평균 ROAS', value: adPerfSummary.avg_roas || 0, fmt: v => v.toFixed(2), bg: (adPerfSummary.avg_roas || 0) >= 1.5 ? 'bg-emerald-50' : 'bg-red-50', border: (adPerfSummary.avg_roas || 0) >= 1.5 ? 'border-emerald-100' : 'border-red-100', color: (adPerfSummary.avg_roas || 0) >= 1.5 ? 'text-emerald-700' : 'text-red-600' },

                    onClick={() => setAdPerfFilter(f.id)}
                    className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors ${

                >

                {filteredAds.map((row, idx) => {
                  const tier = getTier(row);
                  const ps = platformStyle[row.platform] || platformStyle.meta;
                  const isPmax = row.platform === 'google' && row.ad_id && row.ad_id.startsWith('ag_');
                  return (
                    <div key={`${row.ad_id}-${row.platform}-${idx}`}
                      className="bg-white rounded-xl border border-ppl-border overflow-hidden hover:shadow-md hover:border-ppl-teal/40 transition-all group cursor-pointer">
                      {/* Thumbnail */}
                      {row.library_thumb ? (
                        <div className="h-40 relative overflow-hidden bg-gray-50 flex items-center justify-center">
                          <img src={row.library_thumb} alt={row.ad_name || row.ad_id}
                            className="max-h-full max-w-full object-contain" />
                          <span className="absolute top-1.5 left-1.5 text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-blue-500/80 text-white">라이브러리</span>
                          <div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors" />
                        </div>
                      ) : row.image_url ? (
                        <div className="h-40 relative overflow-hidden bg-gray-50 flex items-center justify-center">
                          <img
                            src={`${API}/meta/creative-thumbnail/${row.ad_id}`}
                            alt={row.ad_name || row.ad_id}
                            className="max-h-full max-w-full object-contain"
                            onError={e => { e.target.parentElement.style.display = 'none'; }} />
                          <div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors" />
                        </div>
                      ) : isPmax ? (
                        <div className="h-40 bg-gradient-to-br from-amber-400 to-amber-600 relative flex flex-col items-center justify-center gap-2">
                          <svg width="28" height="28" fill="none" stroke="white" strokeWidth="1.5" viewBox="0 0 24 24" className="opacity-80"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                          <p className="text-white/90 text-xs font-semibold text-center px-3 leading-tight line-clamp-3">{row.ad_name}</p>
                        </div>
                      ) : (
                        <div className={`h-40 bg-gradient-to-br ${getThumbColor(row.ad_id)} relative flex items-center justify-center`}>
                          <div className="text-white/80 text-center px-4">
                            <p className="text-sm font-semibold leading-tight line-clamp-3 drop-shadow">{row.ad_name || row.ad_id}</p>
                          </div>
                          <div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                            <span className="opacity-0 group-hover:opacity-100 transition-opacity text-white text-xs bg-black/40 px-2 py-1 rounded-lg">이미지 미수집</span>
                          </div>
                        </div>
                      )}

                      {/* Badges */}
                      <div className="px-3 pt-2.5 flex items-center gap-1.5 flex-wrap">
                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${ps.bg} ${ps.text}`}>{ps.label}</span>
                        {isPmax && <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-700">PMAX</span>}
                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${tierStyle[tier]}`}>{tierLabel[tier]}</span>
                        {row.image_url && imageUrlCount[row.image_url] > 1 && (
                          <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-700" title="같은 이미지를 공유하는 다른 소재가 있습니다 (EBIZ 카탈로그 광고)">
                            이미지공유 {imageUrlCount[row.image_url]}개
                          </span>
                        )}
                      </div>
                      {/* P.D.A 태그 */}
                      {(row.persona || row.desire || row.awareness) && (
                        <div className="px-3 pt-1 flex flex-wrap gap-1">
                          {row.persona && <span className="px-1.5 py-0.5 rounded text-[9px] font-semibold bg-purple-100 text-purple-700">P {row.persona}</span>}
                          {row.desire  && <span className="px-1.5 py-0.5 rounded text-[9px] font-semibold bg-blue-100 text-blue-700">D {row.desire}</span>}
                          {row.awareness && <span className="px-1.5 py-0.5 rounded text-[9px] font-semibold bg-emerald-100 text-emerald-700">A {row.awareness}</span>}
                        </div>
                      )}

                      {/* Ad info */}
                      <div className="px-3 pt-1.5 pb-1">
                        <p className="text-xs font-semibold text-ppl-text leading-tight break-words">{row.ad_name || `Ad ${row.ad_id}`}</p>
                      </div>

                      {/* Metrics grid */}
                      <div className="px-3 pb-3 pt-2">
                        <div className="grid grid-cols-2 gap-x-4 gap-y-1">
                          <div>
                            <p className="text-[10px] text-ppl-sub font-medium uppercase tracking-wider">지출</p>
                            <p className="text-xs font-bold text-ppl-text">₩{fmtNum(row.spend || 0)}</p>
                          </div>
                          <div>
                            <p className="text-[10px] text-ppl-sub font-medium uppercase tracking-wider">CTR</p>
                            <p className="text-xs font-bold text-ppl-text">{(row.ctr || 0).toFixed(2)}%</p>
                          </div>
                          <div>
                            <p className="text-[10px] text-ppl-sub font-medium uppercase tracking-wider">ROAS</p>
                            <p className={`text-xs font-bold ${(row.roas || 0) >= 1.5 ? 'text-emerald-600' : (row.roas || 0) > 0 ? 'text-red-500' : 'text-ppl-sub'}`}>{(row.roas || 0).toFixed(2)}</p>
                          </div>
                          <div>
                            <p className="text-[10px] text-ppl-sub font-medium uppercase tracking-wider">CPC</p>
                            <p className="text-xs font-bold text-ppl-text">₩{fmtNum(row.cpc || 0)}</p>
                          </div>
                          <div>
                            <p className="text-[10px] text-ppl-sub font-medium uppercase tracking-wider">CPA</p>
                            <p className="text-xs font-bold text-ppl-text">₩{fmtNum(row.cpa || 0)}</p>
                          </div>
                          <div>
                            <p className="text-[10px] text-ppl-sub font-medium uppercase tracking-wider">노출수</p>
                            <p className="text-xs font-bold text-ppl-text">{fmtNum(row.impressions || 0)}</p>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            </>)}
          </div>
        );
      };

      // ─── Overview Panel ──────────────────────────────
      // ─── Automation Panel ─────────────────────────────────────
      // ─── 소재 라이브러리 페이지 ────────────────────────────────────
      const CreativeLibraryPage = () => {
        const [library, setLibrary] = React.useState([]);
        const [loading, setLoading] = React.useState(false);
        const [uploading, setUploading] = React.useState(false);
        const [dragOver, setDragOver] = React.useState(false);
        const fileRef = React.useRef(null);
        const [editingId, setEditingId] = React.useState(null);
        const [editingName, setEditingName] = React.useState('');
        const [mappingId, setMappingId] = React.useState(null);
        const [metaAdList, setMetaAdList] = React.useState([]);
        const [uploadResult, setUploadResult] = React.useState(null);

        // Meta 업로드 상태
        const [metaUploadingId, setMetaUploadingId] = React.useState(null);
        const [metaUploadResults, setMetaUploadResults] = React.useState({});

        // PDA 일괄 분석 상태
        const [pdaAnalyzing, setPdaAnalyzing] = React.useState(false);
        const [pdaAnalyzeResult, setPdaAnalyzeResult] = React.useState(null);


        const loadLibrary = () => {
          setLoading(true);
          apiFetch(`${API}/creative-library`)
            .then(r => r.json())
            .then(data => { setLibrary(Array.isArray(data) ? data : []); setLoading(false); })
            .catch(() => setLoading(false));
        };

        const loadMetaAdList = () => {
          apiFetch(`${API}/meta/ad-list`)
            .then(r => r.json())
            .then(data => {
              const list = Array.isArray(data) ? data : [];
              list.sort((a, b) => (b.ad_name || '').localeCompare(a.ad_name || ''));
              setMetaAdList(list);
            })
            .catch(() => {});
        };

        React.useEffect(() => {
          loadLibrary();
          loadMetaAdList();
          const ws = new WebSocket(WS_URL);
          ws.onmessage = (e) => {
            try {
              const msg = JSON.parse(e.data);
              if (msg.type === 'pda_analyzed') {
                setLibrary(prev => prev.map(i => i.id === msg.data.id
                  ? { ...i, persona: msg.data.persona, desire: msg.data.desire, awareness: msg.data.awareness }
                  : i
                ));
              } else if (msg.type === 'pda_analyze_done') {
                setPdaAnalyzing(false);
                setPdaAnalyzeResult(`${msg.data.total}개 소재 분석 완료`);
              }
            } catch {}
          };
          return () => ws.close();
        }, []);

        const analyzeAllPda = async (overwrite = false) => {
          setPdaAnalyzing(true);
          setPdaAnalyzeResult(null);
          try {
            const data = await apiFetch(`${API}/creative-library/analyze-pda`, {
              method: 'POST',
              body: JSON.stringify({ overwrite }),
            }).then(r => r.json());
            if (data.queued === 0) {
              setPdaAnalyzing(false);
              setPdaAnalyzeResult('분석할 소재가 없습니다 (모두 PDA 입력됨)');
            } else {
              setPdaAnalyzeResult(`${data.queued}개 분석 중...`);
            }
          } catch (e) {
            setPdaAnalyzing(false);
            setPdaAnalyzeResult('분석 요청 실패');
          }
        };

        const uploadFiles = async (files) => {
          if (!files?.length) return;
          setUploading(true); setUploadResult(null);
          const formData = new FormData();
          Array.from(files).forEach(f => formData.append('images', f));
          try {
            const res = await fetch(`${API}/creative-library/upload`, {
              method: 'POST',
              ...(API_TOKEN ? { headers: { Authorization: `Bearer ${API_TOKEN}` } } : {}),
              body: formData,
            });
            const data = await res.json();
            if (data.success) {
              setUploadResult({ ok: true, msg: `${data.uploaded}개 이미지가 라이브러리에 저장됐습니다.` });
              loadLibrary();
            }
          } catch (e) {
            setUploadResult({ ok: false, msg: '업로드 중 오류가 발생했습니다.' });
          } finally { setUploading(false); }
        };

        const deletItem = async (id) => {
          if (!confirm('이 소재를 라이브러리에서 삭제할까요?')) return;
          await apiFetch(`${API}/creative-library/${id}`, { method: 'DELETE' });
          setLibrary(prev => prev.filter(i => i.id !== id));
        };

        const saveName = async (id) => {
          if (!editingName.trim()) return;
          await apiFetch(`${API}/creative-library/${id}`, {
            method: 'PATCH', body: JSON.stringify({ name: editingName }),
          });
          setLibrary(prev => prev.map(i => i.id === id ? { ...i, name: editingName } : i));
          setEditingId(null);
        };

        const savePda = async (id, persona, desire, awareness) => {
          await apiFetch(`${API}/creative-library/${id}/pda`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ persona, desire, awareness }),
          });
          setLibrary(prev => prev.map(i => i.id === id ? { ...i, persona, desire, awareness } : i));
        };

        const saveMapping = async (libId, adId) => {
          await apiFetch(`${API}/creative-library/${libId}/ad-mapping`, {
            method: 'PATCH', body: JSON.stringify({ ad_id: adId || null }),
          });
          setLibrary(prev => prev.map(i => i.id === libId ? { ...i, ad_id: adId || null } : i));
          setMappingId(null);
        };

        const uploadToMeta = async (item) => {
          setMetaUploadingId(item.id);
          setMetaUploadResults(prev => ({ ...prev, [item.id]: null }));
          try {
            // thumbnail 엔드포인트에서 이미지 blob 가져오기
            const imgRes = await fetch(`${API}/creative-library/thumbnail/${item.id}`, {
              ...(API_TOKEN ? { headers: { Authorization: `Bearer ${API_TOKEN}` } } : {}),
            });
            if (!imgRes.ok) throw new Error('이미지 로드 실패');
            const blob = await imgRes.blob();
            const formData = new FormData();
            formData.append('image', blob, item.name + '.jpg');
            formData.append('library_id', item.id);

            const res = await fetch(`${API}/meta/upload-image`, {
              method: 'POST',
              ...(API_TOKEN ? { headers: { Authorization: `Bearer ${API_TOKEN}` } } : {}),
              body: formData,
            });
            const data = await res.json();
            if (data.hash) {
              setMetaUploadResults(prev => ({ ...prev, [item.id]: { ok: true, hash: data.hash } }));
              setLibrary(prev => prev.map(i => i.id === item.id ? { ...i, meta_uploaded: 1, processing_status: 'uploaded_to_meta' } : i));
            } else {
              setMetaUploadResults(prev => ({ ...prev, [item.id]: { ok: false, msg: data.error || '실패' } }));
            }
          } catch (e) {
            setMetaUploadResults(prev => ({ ...prev, [item.id]: { ok: false, msg: e.message } }));
          } finally {
            setMetaUploadingId(null);
          }
        };

        const mappedCount = library.filter(i => i.ad_id).length;

        return (
          <div className="max-w-5xl mx-auto space-y-6">
            {/* 헤더 */}
            <div>
              <h2 className="text-xl font-bold text-ppl-text">소재 라이브러리</h2>
              <p className="text-sm text-ppl-sub mt-1">원본 배너 이미지를 SQLite에 직접 저장합니다. Meta 광고와 연결하면 성과 조회 시 이미지가 항상 표시됩니다.</p>
            </div>

            {/* 업로드 영역 */}
            <div
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={e => { e.preventDefault(); setDragOver(false); uploadFiles(e.dataTransfer.files); }}
              onClick={() => fileRef.current?.click()}
              className={`flex flex-col items-center justify-center h-36 rounded-2xl border-2 border-dashed cursor-pointer transition-all ${dragOver ? 'border-ppl-teal bg-teal-50' : 'border-ppl-border bg-ppl-bg hover:border-ppl-teal hover:bg-teal-50/30'}`}
            >
              <input ref={fileRef} type="file" accept="image/*" multiple className="hidden"
                onChange={e => { if (e.target.files.length) uploadFiles(e.target.files); }} />
              {uploading
                ? <div className="flex items-center gap-2 text-ppl-sub"><span className="w-5 h-5 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span><span className="text-sm">저장 중...</span></div>
                : <>
                    {Icons.upload}
                    <p className="text-sm font-semibold text-ppl-text mt-2">이미지 드래그&드롭 또는 클릭해서 선택</p>
                    <p className="text-xs text-ppl-sub mt-1">JPG, PNG, WebP · 한 번에 여러 파일 선택 가능 · 파일당 최대 30MB</p>
                  </>
              }
            </div>

            {/* 업로드 결과 */}
            {uploadResult && (
              <div className={`rounded-xl px-4 py-3 text-sm font-medium ${uploadResult.ok ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-red-50 text-red-600 border border-red-100'}`}>
                {uploadResult.msg}
              </div>
            )}

            {/* 통계 요약 + PDA 분석 버튼 */}
            {library.length > 0 && (
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-4 text-sm text-ppl-sub">
                  <span>총 <strong className="text-ppl-text">{library.length}</strong>개</span>
                  <span>Meta 광고 연결 <strong className="text-ppl-text">{mappedCount}</strong>개</span>
                  <span>미연결 <strong className="text-amber-500">{library.length - mappedCount}</strong>개</span>
                </div>
                <div className="flex items-center gap-2">
                  {pdaAnalyzeResult && <span className="text-xs text-ppl-sub">{pdaAnalyzeResult}</span>}
                  <button
                    onClick={() => analyzeAllPda(false)}
                    disabled={pdaAnalyzing}
                    className="px-3 py-1.5 rounded-lg text-xs font-medium bg-violet-50 text-violet-600 border border-violet-200 hover:bg-violet-100 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1.5">
                    {pdaAnalyzing
                      ? <><span className="w-3 h-3 border border-violet-400 border-t-transparent rounded-full animate-spin"></span>분석 중...</>
                      : <>✦ PDA 미입력 소재 자동 분석</>}
                  </button>
                  <button
                    onClick={() => { if (confirm('PDA가 이미 입력된 소재도 모두 재분석할까요?')) analyzeAllPda(true); }}
                    disabled={pdaAnalyzing}
                    className="px-3 py-1.5 rounded-lg text-xs font-medium bg-ppl-bg text-ppl-sub border border-ppl-border hover:bg-ppl-hover disabled:opacity-50 disabled:cursor-not-allowed">
                    전체 재분석
                  </button>
                </div>
              </div>
            )}


            {/* 이미지 그리드 */}
            {loading && (
              <div className="flex items-center justify-center h-32 text-ppl-sub gap-2">
                <span className="w-5 h-5 border-2 border-ppl-teal border-t-transparent rounded-full animate-spin"></span>
                <span className="text-sm">불러오는 중...</span>
              </div>
            )}
            {!loading && library.length === 0 && (
              <div className="text-center py-16 text-ppl-sub">
                <div className="text-4xl mb-3">🖼️</div>
                <p className="text-sm">라이브러리가 비어있습니다.</p>
                <p className="text-xs mt-1">위에서 원본 배너 이미지를 업로드하세요.</p>
              </div>
            )}
            {library.length > 0 && (
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                {library.map(item => {
                  const linkedAd = metaAdList.find(a => a.ad_id === item.ad_id);
                  return (
                    <div key={item.id} className="rounded-2xl border border-ppl-border bg-white overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                      {/* 썸네일 */}
                      <div className="aspect-square bg-ppl-bg relative">
                        {item.lib_thumb ? (
                          <img src={item.lib_thumb} alt={item.name} className="w-full h-full object-cover" />
                        ) : (
                          <div className="w-full h-full flex items-center justify-center text-ppl-sub text-xs">이미지 없음</div>
                        )}
                        {item.width && (
                          <span className="absolute bottom-1.5 left-1.5 text-[10px] font-semibold px-1.5 py-0.5 rounded-md bg-black/50 text-white">
                            {item.width}×{item.height}
                          </span>
                        )}
                        {/* 연결 상태 뱃지 */}
                        <span className={`absolute top-1.5 right-1.5 text-[10px] font-bold px-1.5 py-0.5 rounded-full ${item.ad_id ? 'bg-blue-500 text-white' : 'bg-gray-400/70 text-white'}`}>
                          {item.ad_id ? '연결됨' : '미연결'}
                        </span>
                      </div>

                      {/* 이름 */}
                      <div className="px-3 pt-2.5 pb-1">
                        {editingId === item.id ? (
                          <div className="flex gap-1">
                            <input type="text" value={editingName}
                              onChange={e => setEditingName(e.target.value)}
                              onKeyDown={e => { if (e.key === 'Enter') saveName(item.id); if (e.key === 'Escape') setEditingId(null); }}
                              autoFocus className="flex-1 text-xs border border-ppl-border rounded px-1.5 py-1 bg-white" />
                            <button onClick={() => saveName(item.id)} className="text-xs text-emerald-600 font-semibold px-1">저장</button>
                          </div>
                        ) : (
                          <div className="flex items-center gap-1">
                            <p className="flex-1 text-xs font-semibold text-ppl-text truncate" title={item.name}>{item.name}</p>
                            <button onClick={() => { setEditingId(item.id); setEditingName(item.name); }}
                              className="text-ppl-sub hover:text-ppl-text shrink-0" title="이름 수정">
                              <svg width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button onClick={() => deletItem(item.id)}
                              className="text-ppl-sub hover:text-red-500 shrink-0" title="삭제">
                              <svg width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                            </button>
                          </div>
                        )}
                      </div>

                      {/* Meta 광고 연결 */}
                      <div className="px-3 pb-3">
                        {mappingId === item.id ? (
                          <div className="space-y-1">
                            <select defaultValue={item.ad_id || ''}
                              onChange={e => saveMapping(item.id, e.target.value)}
                              className="w-full text-[11px] border border-blue-300 rounded-md px-1.5 py-1.5 bg-white">
                              <option value="">-- 연결 해제 --</option>
                              {metaAdList.map(ad => (
                                <option key={ad.ad_id} value={ad.ad_id}>
                                  {ad.ad_name || ad.ad_id}
                                </option>
                              ))}
                            </select>
                            <button onClick={() => setMappingId(null)} className="text-[10px] text-ppl-sub hover:text-ppl-text">취소</button>
                          </div>
                        ) : item.ad_id ? (
                          <div className="space-y-2">
                            <div className="flex items-center gap-1.5">
                              <div className="flex-1 min-w-0">
                                <p className="text-[10px] text-blue-600 font-medium truncate" title={linkedAd?.ad_name || item.ad_id}>
                                  {linkedAd?.ad_name || item.ad_id}
                                </p>
                                {linkedAd?.campaign_name && (
                                  <p className="text-[10px] text-ppl-sub truncate">{linkedAd.campaign_name}</p>
                                )}
                              </div>
                              <button onClick={() => setMappingId(item.id)}
                                className="text-[10px] text-blue-400 hover:text-blue-600 shrink-0 font-medium">변경</button>
                            </div>
                          </div>
                        ) : (
                          <button onClick={() => setMappingId(item.id)}
                            className="w-full text-[11px] py-1.5 rounded-lg border border-dashed border-blue-300 text-blue-500 hover:bg-blue-50 transition-colors font-medium">
